<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn tập Tiếng Anh - 4 Chế Độ (Nhóm bài đọc)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .mode-bar {
            background: white;
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .mode-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #f0f0f0;
            color: #333;
        }

        .mode-btn:hover {
            transform: translateY(-2px);
        }

        .mode-btn.active {
            background: #1e3c72;
            color: white;
            box-shadow: 0 4px 12px rgba(30,60,114,0.3);
        }

        .mode-btn.reset-mode {
            background: #ff9800;
            color: white;
        }

        .mode-btn.reset-mode:hover {
            background: #e68900;
        }

        .quiz-header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        .quiz-header h1 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 1.5em;
        }

        .quiz-header .mode-info {
            color: #ff9800;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .quiz-header .progress {
            color: #666;
            margin-top: 10px;
            font-size: 1.1em;
        }

        .reading-group-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .passage-text {
            background: #f0f7ff;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 4px solid #3498db;
            line-height: 1.6;
            white-space: pre-wrap;
            font-size: 0.95em;
            max-height: 350px;
            overflow-y: auto;
        }

        .question-item {
            background: #fafafa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
        }

        .question-number {
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 12px;
            font-size: 1em;
        }

        .question-text {
            font-size: 1.05em;
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 15px 0;
        }

        .option-btn {
            padding: 10px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            font-size: 0.95em;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }

        .option-btn.correct-answer {
            background: #27ae60;
            border-color: #1e8449;
            color: white;
        }

        .option-btn.wrong-answer {
            background: #e74c3c;
            border-color: #c0392b;
            color: white;
        }

        .option-btn.disabled-opt {
            cursor: default;
            opacity: 0.9;
        }

        .group-status {
            margin-top: 15px;
            padding: 10px;
            background: #e8f5e9;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9em;
            color: #2e7d32;
        }

        .group-status.completed {
            background: #c8e6c9;
        }

        .group-status.incomplete {
            background: #fff3e0;
            color: #e65100;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
        }

        .prev-btn {
            background: #7f8c8d;
            color: white;
        }

        .next-btn {
            background: #2c3e50;
            color: white;
        }

        .reset-group-btn {
            background: #e67e22;
            color: white;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: default;
        }

        .explanation {
            margin-top: 15px;
            padding: 12px;
            background: #f0f7ff;
            border-radius: 8px;
            border-left: 4px solid #3498db;
            font-size: 0.9em;
        }

        .score-board {
            background: white;
            border-radius: 15px;
            padding: 12px 20px;
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1em;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .no-questions {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        @media (max-width: 600px) {
            .reading-group-card {
                padding: 15px;
            }
            .question-item {
                padding: 12px;
            }
            .mode-btn {
                padding: 8px 16px;
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mode-bar">
            <button class="mode-btn" data-mode="stress">🔊 Trắc nghiệm Trọng âm</button>
            <button class="mode-btn" data-mode="reading">📖 Trắc nghiệm Đoạn văn (nhóm bài)</button>
            <button class="mode-btn" data-mode="regular">📝 Trắc nghiệm Thường</button>
            <button class="mode-btn" data-mode="all">🎲 Trắc nghiệm Toàn bộ (Random)</button>
            <button class="mode-btn reset-mode" id="resetAllBtn">🔄 Làm lại toàn bộ</button>
        </div>

        <div class="quiz-header">
            <h1>📚 Ôn tập Tiếng Anh</h1>
            <div class="mode-info" id="modeInfo">Chọn chế độ làm bài</div>
            <div class="progress" id="progress">Chưa có câu hỏi</div>
        </div>

        <div class="reading-group-card" id="questionCard">
            <div class="no-questions">Vui lòng chọn một chế độ làm bài ở trên</div>
        </div>

        <div class="score-board" id="scoreBoard">
            📊 Chọn chế độ để bắt đầu
        </div>
    </div>

    <script>
        let allQuestions = [];
        let currentMode = null;
        
        // Cấu trúc cho chế độ reading: nhóm các câu theo bài đọc
        let readingGroups = []; // Mỗi group: { passage, questions: [{ id, text, options, correct, explanation }] }
        let currentGroupIndex = 0;
        let groupAnswers = []; // Lưu câu trả lời cho từng câu trong group
        
        // Cấu trúc cho các chế độ khác
        let simpleQuestions = [];
        let currentSimpleIndex = 0;
        let simpleAnswers = [];
        
        let isReadingMode = false;

        // Dữ liệu mặc định
        function getDefaultData() {
            return {
                stressQuestions: [
                    { id: 1, text: 'Choose the word which has a different stress pattern.', options: ['A. valley', 'B. complex', 'C. habit', 'D. campaign'], correct: 3, explanation: 'campaign nhấn âm 2, còn lại âm 1' },

                    { id: 3, text: 'Choose the word which has a different stress pattern.', options: ['A. bachelor', 'B. diploma', 'C. internship', 'D. scholarship'], correct: 1, explanation: 'diploma nhấn âm 2, còn lại âm 1' },

                    { id: 5, text: 'Choose the word which has a different stress pattern.', options: ['A. discuss', 'B. respect', 'C. perform', 'D. manage'], correct: 3, explanation: 'manage nhấn âm 1, còn lại âm 2' },
                    { id: 6, text: 'Choose the word which has a different stress pattern.', options: ['A. bully', 'B. manage', 'C. struggle', 'D. obey'], correct: 3, explanation: 'obey nhấn âm 2, còn lại âm 1' },
                    { id: 7, text: 'Choose the word which has a different stress pattern.', options: ['A. offensive', 'B. habitat', 'C. awareness', 'D. depression'], correct: 1, explanation: 'habitat nhấn âm 1, còn lại âm 2' },
                    { id: 8, text: 'Choose the word which has a different stress pattern.', options: ['A. degree', 'B. trending', 'C. brochure', 'D. valley'], correct: 0, explanation: 'degree nhấn âm 2, còn lại âm 1' },
                    { id: 9, text: 'Choose the word which has a different stress pattern.', options: ['A. opportunity', 'B. institution', 'C. university', 'D. apprenticeship'], correct: 3, explanation: 'apprenticeship nhấn âm 2, còn lại âm 3' },
                    { id: 10, text: 'Choose the word which has a different stress pattern.', options: ['A. awareness', 'B. depression', 'C. confident', 'D. mechanic'], correct: 2, explanation: 'confident nhấn âm 1, còn lại âm 2' }

                    { id: 11, text: '__________ helps protect and restore heritage by raising money for cultural projects.', options: ['A. Limestone', 'B. Crowdfunding', 'C. Valley', 'D. State'], correct: 1, explanation: 'Crowdfunding - huy động vốn cộng đồng' },
                    { id: 12, text: 'In an effort to __________ cultural diversity, the festival featured performances...', options: ['A. recommend', 'B. punish', 'C. preserve', 'D. reduce'], correct: 2, explanation: 'preserve - bảo tồn' },

                    { id: 15, text: 'They do part-time jobs to gain work experience and learn how to __________ money.', options: ['A. manage', 'B. lose', 'C. plan', 'D. provide'], correct: 0, explanation: 'manage money - quản lý tiền' },
                    { id: 16, text: 'This __________ app helps me create to-do lists...', options: ['A. time-management', 'B. money-management', 'C. skill-development', 'D. self-study'], correct: 0, explanation: 'time-management app - quản lý thời gian' },
                    { id: 17, text: 'I have __________ of trying to complete all the housework...', options: ['A. made use', 'B. taken advantage', 'C. came up', 'D. got into the habit'], correct: 3, explanation: 'get into the habit of - có thói quen' },

                    { id: 19, text: 'The site will be closed for six months __________ the buildings...', options: ['A. restoring', 'B. restore', 'C. restored', 'D. to restore'], correct: 3, explanation: 'to restore - để khôi phục' },
                    { id: 20, text: '__________ bullying includes using offensive language...', options: ['A. Physical', 'B. Cyber', 'C. Mental', 'D. Verbal'], correct: 3, explanation: 'Verbal bullying - bắt nạt bằng lời nói' },

                    { id: 22, text: 'Vocational schools help students __________ practical skills...', options: ['A. gain', 'B. do', 'C. win', 'D. catch'], correct: 0, explanation: 'gain skills - đạt được kỹ năng' },
                    { id: 23, text: '__________ is a growing concern as technology becomes more common...', options: ['A. Overpopulation', 'B. Policy', 'C. Self-confidence', 'D. Cyberbullying'], correct: 3, explanation: 'Cyberbullying - bắt nạt trực tuyến' },
                    { id: 24, text: 'My mother remembered __________ visited this place.', options: ['A. having', 'B. have', 'C. had', 'D. has'], correct: 0, explanation: 'remember having done sth - nhớ đã làm gì' },

                    {
                        passage: `It is not surprising that almost all first-year students have a lot of problems when they must live (1) __________ at university. At the first stage, due to not having a suitable schedule, they keep failing to meet deadlines. (2) __________ high school where the homework is quite simple and just about what is taught in class, the college or university assignments require the students to do more research for its requirements and to complete within a given time. Another issue which often makes students stressed is that they don't have (3) __________ money to pay for things. One reason for that problem is that some students don't (4) __________ enough financial support from their parents to pay for both tuition fee and living costs. Another reason is that some students don't spend money in the right way. It's possible for college or university students to thoroughly solve the problems above. For example, they can plan carefully for their assignments or essays, make use (5) __________ modern technologies to study faster. Besides, they can work part-time to support themselves financially.`,
                        questions: [
                            { id: 65, subId: 1, text: 'Question (1):', options: ['A. dependent', 'B. dependently', 'C. independent', 'D. independently'], correct: 3, explanation: 'live independently - sống độc lập' },
                            { id: 66, subId: 2, text: 'Question (2):', options: ['A. Like', 'B. Unlike', 'C. Dislike', 'D. Similar'], correct: 1, explanation: 'Unlike - không giống như' },
                            { id: 67, subId: 3, text: 'Question (3):', options: ['A. much', 'B. little', 'C. enough', 'D. lots of'], correct: 2, explanation: 'enough money - đủ tiền' },
                            { id: 68, subId: 4, text: 'Question (4):', options: ['A. give', 'B. donate', 'C. receive', 'D. distribute'], correct: 2, explanation: 'receive support - nhận hỗ trợ' },
                            { id: 69, subId: 5, text: 'Question (5):', options: ['A. of', 'B. on', 'C. with', 'D. in'], correct: 0, explanation: 'make use of - tận dụng' }
                        ]
                    },
                    {
                        passage: `Time management for students is a universal issue. It's essential to know (1) __________ to manage your time for classes, assignments, friends and work if you have a part-time job. This is probably the most important skill that will help a student succeed. Unlike high school, where you have clearly defined class periods and a strict structure to your school day, college education (2) __________ their students to have more freedom. Unless you learn to manage your time, you may be constantly chased by (3) __________ and be left with little time to accomplish them all. Luckily, there are some strategies and tips that will help keep your assignments on track. Firstly, you need to set goals. Consider what you need to do this week, month and semester. Secondly, create a list of every task you need to complete in a certain time. Then figure (4) __________ which assignments you need to complete first and what tasks can wait. You can use sticky notes in bright colors to help remember what (5) __________. You can also use apps on your smartphone to set reminders.`,
                        questions: [
                            { id: 70, subId: 1, text: 'Question (1):', options: ['A. why', 'B. how', 'C. what', 'D. that'], correct: 1, explanation: 'how to manage - cách quản lý' },
                            { id: 71, subId: 2, text: 'Question (2):', options: ['A. allows', 'B. lets', 'C. makes', 'D. has'], correct: 0, explanation: 'allows somebody to do something - cho phép ai làm gì' },
                            { id: 72, subId: 3, text: 'Question (3):', options: ['A. skills', 'B. recipes', 'C. deadlines', 'D. budgets'], correct: 2, explanation: 'deadlines - hạn chót' },
                            { id: 73, subId: 4, text: 'Question (4):', options: ['A. for', 'B. at', 'C. with', 'D. out'], correct: 3, explanation: 'figure out - tìm ra' },
                            { id: 74, subId: 5, text: 'Question (5):', options: ['A. do', 'B. doing', 'C. done', 'D. to do'], correct: 3, explanation: 'what to do - việc cần làm' }
                        ]
                    },
                    {
                        passage: `My Son Sanctuary was discovered in 1885 and recognized by UNESCO as World Heritage Site in December 1999. It was built during the Chăm civilization between the 4th century and 13th century. It is a stunning architectural complex of more than 70 tower structures that are believed to be temples and tombs to worship Hindu Gods. It (1) __________ the values of history, culture, architecture and art in a long period of nine centuries. Each temple has a unique structural style that reflects the (2) __________ stages of the Chăm kingdom. Unfortunately, a large part of the architecture was destroyed (3) __________ natural disasters and war-related damage. About 10 of those temple towers are in almost perfect condition. However, it is still a destination that attracts tourists from all over the world. A management board has been set up to carry out restoration and conservation of the sanctuary. They not only (4) __________ the cultural heritage values but also develop tourism, improve local (5) __________ and promote unique Vietnamese cultural identities to the world.`,
                        questions: [
                            { id: 75, subId: 1, text: 'Question (1):', options: ['A. consists', 'B. requires', 'C. creates', 'D. contains'], correct: 3, explanation: 'contains - chứa đựng' },
                            { id: 76, subId: 2, text: 'Question (2):', options: ['A. historical', 'B. historian', 'C. history', 'D. historically'], correct: 0, explanation: 'historical stages - các giai đoạn lịch sử' },
                            { id: 77, subId: 3, text: 'Question (3):', options: ['A. despite', 'B. although', 'C. because of', 'D. as a result'], correct: 2, explanation: 'because of - bởi vì' },

                            { id: 79, subId: 5, text: 'Question (5):', options: ['A. history', 'B. economy', 'C. science', 'D. weather'], correct: 1, explanation: 'economy - kinh tế' }

                    }
                ]
            };
        }

        async function loadData() {
            try {
                const response = await fetch('english_questions.json');
                const data = await response.json();
                allQuestions = data.questions;
                
                // Phân loại câu hỏi
                const stress = allQuestions.filter(q => q.type === 'stress' || (q.id >= 1 && q.id <= 10));
                const regular = allQuestions.filter(q => q.type === 'regular' || (q.id >= 11 && q.id <= 48) || (q.id >= 49 && q.id <= 64));
                
                // Tạo reading groups từ các câu có type 'reading'
                const readingQs = allQuestions.filter(q => q.type === 'reading' || (q.id >= 65 && q.id <= 89));
                const groups = [];
                // Nhóm các câu cùng bài đọc (dựa trên passage giống nhau)
                const tempGroups = {};
                readingQs.forEach(q => {
                    const passageKey = q.passage || q.text.split('\n\n')[0];
                    if (!tempGroups[passageKey]) {
                        tempGroups[passageKey] = { passage: passageKey, questions: [] };
                    }
                    tempGroups[passageKey].questions.push(q);
                });
                for (const key in tempGroups) {
                    // Sắp xếp câu hỏi theo thứ tự
                    tempGroups[key].questions.sort((a,b) => a.id - b.id);
                    groups.push(tempGroups[key]);
                }
                
                window.stressData = stress;
                window.regularData = regular;
                window.readingGroups = groups.length ? groups : getDefaultData().readingGroups;
                
                if (stress.length === 0) window.stressData = getDefaultData().stressQuestions;
                if (regular.length === 0) window.regularData = getDefaultData().regularQuestions;
                
            } catch (e) {
                console.log('Dùng dữ liệu mặc định');
                window.stressData = getDefaultData().stressQuestions;
                window.regularData = getDefaultData().regularQuestions;
                window.readingGroups = getDefaultData().readingGroups;
            }
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function startMode(mode) {
            currentMode = mode;
            const modeInfo = document.getElementById('modeInfo');
            const progress = document.getElementById('progress');
            
            if (mode === 'stress') {
                isReadingMode = false;
                simpleQuestions = [...window.stressData];
                simpleQuestions = shuffleArray(simpleQuestions);
                simpleAnswers = simpleQuestions.map(() => ({ answered: false, selected: null }));
                currentSimpleIndex = 0;
                modeInfo.innerHTML = '🔊 Đang làm: Trắc nghiệm Trọng âm';
                renderSimpleQuestion();
                updateSimpleUI();
            } 
            else if (mode === 'regular') {
                isReadingMode = false;
                simpleQuestions = [...window.regularData];
                simpleQuestions = shuffleArray(simpleQuestions);
                simpleAnswers = simpleQuestions.map(() => ({ answered: false, selected: null }));
                currentSimpleIndex = 0;
                modeInfo.innerHTML = '📝 Đang làm: Trắc nghiệm Thường';
                renderSimpleQuestion();
                updateSimpleUI();
            }
            else if (mode === 'reading') {
                isReadingMode = true;
                readingGroups = [...window.readingGroups];
                readingGroups = shuffleArray(readingGroups);
                currentGroupIndex = 0;
                groupAnswers = readingGroups.map(group => ({
                    completed: false,
                    answers: group.questions.map(() => ({ answered: false, selected: null }))
                }));
                modeInfo.innerHTML = '📖 Đang làm: Trắc nghiệm Đoạn văn (nhóm bài)';
                renderReadingGroup();
                updateReadingUI();
            }
            else if (mode === 'all') {
                isReadingMode = false;
                const all = [...window.stressData, ...window.regularData];
                // Thêm tất cả câu hỏi từ reading groups
                window.readingGroups.forEach(group => {
                    all.push(...group.questions);
                });
                simpleQuestions = shuffleArray(all);
                simpleAnswers = simpleQuestions.map(() => ({ answered: false, selected: null }));
                currentSimpleIndex = 0;
                modeInfo.innerHTML = '🎲 Đang làm: Trắc nghiệm Toàn bộ (Random)';
                renderSimpleQuestion();
                updateSimpleUI();
            }
            
            document.querySelectorAll('.mode-btn').forEach(btn => {
                if (btn.dataset.mode === mode) btn.classList.add('active');
                else if (btn.id !== 'resetAllBtn') btn.classList.remove('active');
            });
        }

        function renderSimpleQuestion() {
            const card = document.getElementById('questionCard');
            if (!simpleQuestions.length || currentSimpleIndex >= simpleQuestions.length) {
                card.innerHTML = '<div class="no-questions">Không có câu hỏi</div>';
                return;
            }
            
            const q = simpleQuestions[currentSimpleIndex];
            const ans = simpleAnswers[currentSimpleIndex];
            
            let html = `<div class="question-item">
                <div class="question-number">Câu hỏi ${currentSimpleIndex + 1} / ${simpleQuestions.length}</div>
                <div class="question-text">${escapeHtml(q.text)}</div>
                <div class="options">`;
            
            q.options.forEach((opt, idx) => {
                let cls = '';
                if (ans.answered) {
                    if (ans.selected === idx) cls = (idx === q.correct) ? 'correct-answer' : 'wrong-answer';
                    if (idx === q.correct && ans.selected !== idx) cls = 'correct-answer';
                    cls += ' disabled-opt';
                }
                html += `<button class="option-btn ${cls}" data-opt-index="${idx}" ${ans.answered ? 'disabled' : ''}>${escapeHtml(opt)}</button>`;
            });
            
            html += `</div>`;
            
            if (ans.answered && q.explanation) {
                html += `<div class="explanation">💡 ${escapeHtml(q.explanation)}</div>`;
            }
            
            html += `<div class="nav-buttons">
                        <button class="nav-btn prev-btn" id="prevBtn" ${currentSimpleIndex === 0 ? 'disabled' : ''}>◀ Câu trước</button>
                        <button class="nav-btn next-btn" id="nextBtn" ${currentSimpleIndex === simpleQuestions.length - 1 ? 'disabled' : ''}>Câu tiếp theo ▶</button>
                    </div>`;
            html += `</div>`;
            
            card.innerHTML = html;
            
            if (!ans.answered) {
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const idx = parseInt(btn.dataset.optIndex);
                        simpleAnswers[currentSimpleIndex] = { answered: true, selected: idx };
                        renderSimpleQuestion();
                        updateSimpleUI();
                    });
                });
            }
            
            document.getElementById('prevBtn')?.addEventListener('click', () => {
                if (currentSimpleIndex > 0) {
                    currentSimpleIndex--;
                    renderSimpleQuestion();
                    updateSimpleUI();
                }
            });
            document.getElementById('nextBtn')?.addEventListener('click', () => {
                if (currentSimpleIndex < simpleQuestions.length - 1) {
                    currentSimpleIndex++;
                    renderSimpleQuestion();
                    updateSimpleUI();
                }
            });
        }
        
        function renderReadingGroup() {
            const card = document.getElementById('questionCard');
            if (!readingGroups.length || currentGroupIndex >= readingGroups.length) {
                card.innerHTML = '<div class="no-questions">Không có bài đọc nào</div>';
                return;
            }
            
            const group = readingGroups[currentGroupIndex];
            const groupAns = groupAnswers[currentGroupIndex];
            const allAnswered = groupAns.answers.every(a => a.answered);
            
            let html = `<div class="passage-text">${escapeHtml(group.passage)}</div>`;
            
            group.questions.forEach((q, qIdx) => {
                const ans = groupAns.answers[qIdx];
                html += `<div class="question-item">
                    <div class="question-number">Câu (${q.subId || (qIdx+1)})</div>
                    <div class="question-text">${escapeHtml(q.text)}</div>
                    <div class="options">`;
                
                q.options.forEach((opt, optIdx) => {
                    let cls = '';
                    if (ans.answered) {
                        if (ans.selected === optIdx) cls = (optIdx === q.correct) ? 'correct-answer' : 'wrong-answer';
                        if (optIdx === q.correct && ans.selected !== optIdx) cls = 'correct-answer';
                        cls += ' disabled-opt';
                    }
                    html += `<button class="option-btn ${cls}" data-qidx="${qIdx}" data-opt="${optIdx}" ${ans.answered ? 'disabled' : ''}>${escapeHtml(opt)}</button>`;
                });
                
                html += `</div>`;
                if (ans.answered && q.explanation) {
                    html += `<div class="explanation">💡 ${escapeHtml(q.explanation)}</div>`;
                }
                html += `</div>`;
            });
            
            const statusClass = allAnswered ? 'completed' : 'incomplete';
            const statusText = allAnswered ? '✅ Đã hoàn thành tất cả câu hỏi trong bài này!' : '⚠️ Bạn chưa trả lời hết các câu hỏi trong bài.';
            html += `<div class="group-status ${statusClass}">${statusText}</div>`;
            
            html += `<div class="nav-buttons">
                        <button class="nav-btn prev-btn" id="prevGroupBtn" ${currentGroupIndex === 0 ? 'disabled' : ''}>◀ Bài trước</button>
                        <button class="nav-btn next-btn" id="nextGroupBtn" ${currentGroupIndex === readingGroups.length - 1 ? 'disabled' : ''}>Bài tiếp theo ▶</button>
                    </div>`;
            
            card.innerHTML = html;
            
            // Gắn sự kiện cho các nút đáp án
            if (!allAnswered) {
                document.querySelectorAll('.option-btn').forEach(btn => {
                    if (!btn.disabled) {
                        btn.addEventListener('click', (e) => {
                            const qIdx = parseInt(btn.dataset.qidx);
                            const optIdx = parseInt(btn.dataset.opt);
                            const groupAnsCurrent = groupAnswers[currentGroupIndex];
                            if (!groupAnsCurrent.answers[qIdx].answered) {
                                groupAnsCurrent.answers[qIdx] = { answered: true, selected: optIdx };
                                renderReadingGroup();
                                updateReadingUI();
                            }
                        });
                    }
                });
            }
            
            document.getElementById('prevGroupBtn')?.addEventListener('click', () => {
                if (currentGroupIndex > 0) {
                    currentGroupIndex--;
                    renderReadingGroup();
                    updateReadingUI();
                }
            });
            document.getElementById('nextGroupBtn')?.addEventListener('click', () => {
                if (currentGroupIndex < readingGroups.length - 1) {
                    currentGroupIndex++;
                    renderReadingGroup();
                    updateReadingUI();
                }
            });
        }
        
        function updateSimpleUI() {
            const total = simpleQuestions.length;
            const answered = simpleAnswers.filter(a => a.answered).length;
            document.getElementById('progress').innerHTML = `Câu ${currentSimpleIndex + 1} / ${total} | Đã trả lời: ${answered}/${total}`;
            document.getElementById('scoreBoard').innerHTML = `📊 Đã trả lời: ${answered} / ${total} câu | ${answered === total ? '✅ Hoàn thành!' : '📝 Tiếp tục nào!'}`;
        }
        
        function updateReadingUI() {
            let totalQuestions = 0;
            let totalAnswered = 0;
            readingGroups.forEach((group, idx) => {
                group.questions.forEach((q, qIdx) => {
                    totalQuestions++;
                    if (groupAnswers[idx].answers[qIdx].answered) totalAnswered++;
                });
            });
            document.getElementById('progress').innerHTML = `Bài ${currentGroupIndex + 1} / ${readingGroups.length} | Tổng đã trả lời: ${totalAnswered}/${totalQuestions}`;
            document.getElementById('scoreBoard').innerHTML = `📊 Đã trả lời: ${totalAnswered} / ${totalQuestions} câu | ${totalAnswered === totalQuestions ? '✅ Hoàn thành toàn bộ!' : '📝 Tiếp tục nào!'}`;
        }
        
        function resetAll() {
            if (currentMode === 'stress' || currentMode === 'regular' || currentMode === 'all') {
                if (currentMode === 'stress') startMode('stress');
                else if (currentMode === 'regular') startMode('regular');
                else if (currentMode === 'all') startMode('all');
                else startMode('stress');
            } else if (currentMode === 'reading') {
                startMode('reading');
            } else {
                document.getElementById('questionCard').innerHTML = '<div class="no-questions">Vui lòng chọn một chế độ làm bài ở trên</div>';
                document.getElementById('progress').innerHTML = 'Chưa có câu hỏi';
                document.getElementById('scoreBoard').innerHTML = '📊 Chọn chế độ để bắt đầu';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
        
        document.querySelectorAll('.mode-btn').forEach(btn => {
            if (btn.id === 'resetAllBtn') {
                btn.addEventListener('click', resetAll);
            } else {
                btn.addEventListener('click', () => startMode(btn.dataset.mode));
            }
        });
        
        loadData().then(() => {
            console.log('Dữ liệu đã sẵn sàng');
        });
    </script>
</body>
</html>
