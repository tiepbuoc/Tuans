<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn tập Tiếng Anh - 4 Chế Độ (Nhóm bài đọc)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .mode-bar {
            background: white;
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .mode-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #f0f0f0;
            color: #333;
        }

        .mode-btn:hover {
            transform: translateY(-2px);
        }

        .mode-btn.active {
            background: #1e3c72;
            color: white;
            box-shadow: 0 4px 12px rgba(30,60,114,0.3);
        }

        .mode-btn.reset-mode {
            background: #ff9800;
            color: white;
        }

        .mode-btn.reset-mode:hover {
            background: #e68900;
        }

        .quiz-header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        .quiz-header h1 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 1.5em;
        }

        .quiz-header .mode-info {
            color: #ff9800;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .quiz-header .progress {
            color: #666;
            margin-top: 10px;
            font-size: 1.1em;
        }

        .question-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.15em;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .passage-text {
            background: #f0f7ff;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #3498db;
            line-height: 1.6;
            white-space: pre-wrap;
            font-size: 0.95em;
            max-height: 400px;
            overflow-y: auto;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        .option-btn {
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            font-size: 1em;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }

        .option-btn.correct-answer {
            background: #27ae60;
            border-color: #1e8449;
            color: white;
        }

        .option-btn.wrong-answer {
            background: #e74c3c;
            border-color: #c0392b;
            color: white;
        }

        .option-btn.disabled-opt {
            cursor: default;
            opacity: 0.9;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
        }

        .prev-btn {
            background: #7f8c8d;
            color: white;
        }

        .next-btn {
            background: #2c3e50;
            color: white;
        }

        .reset-questions-btn {
            background: #e67e22;
            color: white;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: default;
        }

        .explanation {
            margin-top: 20px;
            padding: 12px;
            background: #f0f7ff;
            border-radius: 8px;
            border-left: 4px solid #3498db;
            font-size: 0.9em;
        }

        .score-board {
            background: white;
            border-radius: 15px;
            padding: 12px 20px;
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1em;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .no-questions {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .reading-group-info {
            background: #e8f5e9;
            padding: 8px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.85em;
            color: #2e7d32;
            text-align: center;
        }

        @media (max-width: 600px) {
            .question-card {
                padding: 18px;
            }
            .mode-btn {
                padding: 8px 16px;
                font-size: 0.85em;
            }
            .nav-btn {
                padding: 8px 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mode-bar">
            <button class="mode-btn" data-mode="stress">🔊 Trắc nghiệm Trọng âm</button>
            <button class="mode-btn" data-mode="reading">📖 Trắc nghiệm Đoạn văn</button>
            <button class="mode-btn" data-mode="regular">📝 Trắc nghiệm Thường</button>
            <button class="mode-btn" data-mode="all">🎲 Trắc nghiệm Toàn bộ (Random)</button>
            <button class="mode-btn reset-mode" id="resetAllBtn">🔄 Làm lại toàn bộ</button>
        </div>

        <div class="quiz-header">
            <h1>📚 Ôn tập Tiếng Anh</h1>
            <div class="mode-info" id="modeInfo">Chọn chế độ làm bài</div>
            <div class="progress" id="progress">Chưa có câu hỏi</div>
        </div>

        <div class="question-card" id="questionCard">
            <div class="no-questions">Vui lòng chọn một chế độ làm bài ở trên</div>
        </div>

        <div class="score-board" id="scoreBoard">
            📊 Chọn chế độ để bắt đầu
        </div>
    </div>

    <script>
        // Dữ liệu câu hỏi gốc
        let fullQuestions = [];
        
        // Cấu trúc nhóm bài đọc (theo ID range)
        const READING_GROUPS = [
            { name: "Bài 1: Sinh viên năm nhất", startId: 65, endId: 69, passageText: null },
            { name: "Bài 2: Quản lý thời gian", startId: 70, endId: 74, passageText: null },
            { name: "Bài 3: Thánh địa Mỹ Sơn", startId: 75, endId: 79, passageText: null },
            { name: "Bài 4: Bảo tồn di sản", startId: 80, endId: 84, passageText: null },
            { name: "Bài 5: Đại học Mở", startId: 85, endId: 89, passageText: null }
        ];

        let currentMode = null;
        let questionGroups = [];     // Mảng các nhóm câu hỏi (mỗi nhóm là 1 bài đọc hoặc 1 câu đơn)
        let currentGroupIndex = 0;
        let currentQuestionInGroup = 0;
        let userAnswers = [];

        // DOM elements
        const modeInfo = document.getElementById('modeInfo');
        const progress = document.getElementById('progress');
        const questionCard = document.getElementById('questionCard');
        const scoreBoard = document.getElementById('scoreBoard');

        async function loadQuestions() {
            try {
                const response = await fetch('english_questions.json');
                const data = await response.json();
                fullQuestions = data.questions;
                console.log(`Đã tải ${fullQuestions.length} câu hỏi từ file JSON`);
                extractPassageTexts();
            } catch (error) {
                console.error('Không tìm thấy file JSON, sử dụng dữ liệu mặc định');
                fullQuestions = getDefaultQuestions();
                extractPassageTexts();
            }
        }

        // Trích xuất đoạn văn từ câu hỏi đầu tiên của mỗi bài đọc
        function extractPassageTexts() {
            for (let group of READING_GROUPS) {
                const firstQuestion = fullQuestions.find(q => q.id === group.startId);
                if (firstQuestion && firstQuestion.passage) {
                    group.passageText = firstQuestion.passage;
                } else if (firstQuestion) {
                    // Trích xuất đoạn văn từ text nếu có
                    const text = firstQuestion.text || '';
                    const passageMatch = text.match(/^(.*?)(?=\n\nQuestion|\nQuestion|$)/s);
                    if (passageMatch && passageMatch[1].length > 100) {
                        group.passageText = passageMatch[1].trim();
                    } else {
                        group.passageText = "Đoạn văn đang được cập nhật...";
                    }
                }
            }
        }

        function getDefaultQuestions() {
            return [
                // Trọng âm (1-10)
                { id: 1, type: 'stress', text: 'Choose the word which has a different stress pattern.', options: ['A. valley', 'B. complex', 'C. habit', 'D. campaign'], correct: 3, explanation: 'campaign nhấn âm 2, còn lại âm 1' },
                { id: 2, type: 'stress', text: 'Choose the word which has a different stress pattern.', options: ['A. management', 'B. doctorate', 'C. advantage', 'D. confidence'], correct: 2, explanation: 'advantage nhấn âm 2, còn lại âm 1' },
                { id: 3, type: 'stress', text: 'Choose the word which has a different stress pattern.', options: ['A. bachelor', 'B. diploma', 'C. internship', 'D. scholarship'], correct: 1, explanation: 'diploma nhấn âm 2, còn lại âm 1' },
                { id: 4, type: 'stress', text: 'Choose the word which has a different stress pattern.', options: ['A. heritage', 'B. monument', 'C. citadel', 'D. awareness'], correct: 3, explanation: 'awareness nhấn âm 2, còn lại âm 1' },
                { id: 5, type: 'stress', text: 'Choose the word which has a different stress pattern.', options: ['A. discuss', 'B. respect', 'C. perform', 'D. manage'], correct: 3, explanation: 'manage nhấn âm 1, còn lại âm 2' },
                { id: 6, type: 'stress', text: 'Choose the word which has a different stress pattern.', options: ['A. bully', 'B. manage', 'C. struggle', 'D. obey'], correct: 3, explanation: 'obey nhấn âm 2, còn lại âm 1' },
                { id: 7, type: 'stress', text: 'Choose the word which has a different stress pattern.', options: ['A. offensive', 'B. habitat', 'C. awareness', 'D. depression'], correct: 1, explanation: 'habitat nhấn âm 1, còn lại âm 2' },
                { id: 8, type: 'stress', text: 'Choose the word which has a different stress pattern.', options: ['A. degree', 'B. trending', 'C. brochure', 'D. valley'], correct: 0, explanation: 'degree nhấn âm 2, còn lại âm 1' },
                { id: 9, type: 'stress', text: 'Choose the word which has a different stress pattern.', options: ['A. opportunity', 'B. institution', 'C. university', 'D. apprenticeship'], correct: 3, explanation: 'apprenticeship nhấn âm 2, còn lại âm 3' },
                { id: 10, type: 'stress', text: 'Choose the word which has a different stress pattern.', options: ['A. awareness', 'B. depression', 'C. confident', 'D. mechanic'], correct: 2, explanation: 'confident nhấn âm 1, còn lại âm 2' },
                
                // Trắc nghiệm thường (11-48)
                { id: 11, type: 'regular', text: '__________ helps protect and restore heritage by raising money for cultural projects.', options: ['A. Limestone', 'B. Crowdfunding', 'C. Valley', 'D. State'], correct: 1, explanation: 'Crowdfunding - huy động vốn cộng đồng' },
                { id: 12, type: 'regular', text: 'In an effort to __________ cultural diversity, the festival featured performances...', options: ['A. recommend', 'B. punish', 'C. preserve', 'D. reduce'], correct: 2, explanation: 'preserve - bảo tồn' },
                { id: 13, type: 'regular', text: 'Is becoming independent as __________ as we may think?', options: ['A. challenging', 'B. curious', 'C. responsible', 'D. academic'], correct: 0, explanation: 'challenging - đầy thách thức' },
                { id: 14, type: 'regular', text: 'Exploring ancient temples and pagodas has become a __________ activity...', options: ['A. trending', 'B. festive', 'C. folk', 'D. ancient'], correct: 0, explanation: 'trending - thịnh hành' },
                { id: 15, type: 'regular', text: 'They do part-time jobs to gain work experience and learn how to __________ money.', options: ['A. manage', 'B. lose', 'C. plan', 'D. provide'], correct: 0, explanation: 'manage money - quản lý tiền' },
                { id: 16, type: 'regular', text: 'This __________ app helps me create to-do lists...', options: ['A. time-management', 'B. money-management', 'C. skill-development', 'D. self-study'], correct: 0, explanation: 'time-management app - quản lý thời gian' },
                { id: 17, type: 'regular', text: 'I have __________ of trying to complete all the housework...', options: ['A. made use', 'B. taken advantage', 'C. came up', 'D. got into the habit'], correct: 3, explanation: 'get into the habit of - có thói quen' },

                { id: 20, type: 'regular', text: '__________ bullying includes using offensive language...', options: ['A. Physical', 'B. Cyber', 'C. Mental', 'D. Verbal'], correct: 3, explanation: 'Verbal bullying - bắt nạt bằng lời nói' },
                { id: 21, type: 'regular', text: 'Improving your self-__________ is one way to deal with body shaming.', options: ['A. confident', 'B. confidence', 'C. study', 'D. importance'], correct: 1, explanation: 'self-confidence - sự tự tin' },
                { id: 22, type: 'regular', text: 'Vocational schools help students __________ practical skills...', options: ['A. gain', 'B. do', 'C. win', 'D. catch'], correct: 0, explanation: 'gain skills - đạt được kỹ năng' },
                { id: 23, type: 'regular', text: '__________ is a growing concern as technology becomes more common...', options: ['A. Overpopulation', 'B. Policy', 'C. Self-confidence', 'D. Cyberbullying'], correct: 3, explanation: 'Cyberbullying - bắt nạt trực tuyến' },
                { id: 24, type: 'regular', text: 'My mother remembered __________ visited this place.', options: ['A. having', 'B. have', 'C. had', 'D. has'], correct: 0, explanation: 'remember having done sth - nhớ đã làm gì' },
                { id: 25, type: 'regular', text: 'If you don\'t want to go to university, you can __________ an apprenticeship...', options: ['A. make', 'B. stay', 'C. do', 'D. give'], correct: 2, explanation: 'do an apprenticeship - học nghề' },
                { id: 26, type: 'regular', text: 'Thank you for __________ me your wonderful advice.', options: ['A. give', 'B. having given', 'C. being given', 'D. to have given'], correct: 1, explanation: 'having given - dạng hoàn thành' },
                { id: 27, type: 'regular', text: 'My parents were proud of having __________ the best schools...', options: ['A. choose', 'B. choosing', 'C. chose', 'D. chosen'], correct: 3, explanation: 'having chosen - dạng hoàn thành' },
                { id: 28, type: 'regular', text: 'It is important for school-leavers to __________ a decision...', options: ['A. take', 'B. make', 'C. do', 'D. get'], correct: 1, explanation: 'make a decision - đưa ra quyết định' },
                { id: 29, type: 'regular', text: 'Many teenagers suffer __________ depression and anxiety...', options: ['A. with', 'B. from', 'C. of', 'D. by'], correct: 1, explanation: 'suffer from - chịu đựng' },
                { id: 30, type: 'regular', text: '__________ studied the brochure carefully, my brother decided...', options: ['A. Having', 'B. Having been', 'C. Have', 'D. Had'], correct: 0, explanation: 'Having studied - phân từ hoàn thành' },
                
                // Lỗi sai (49-56)
                { id: 49, type: 'regular', text: 'Find the underlined part that needs correction: Body-shame is the practice...', options: ['A. Body-shame', 'B. practice', 'C. offensive', 'D. about'], correct: 0, explanation: 'Body-shame → Body-shaming' },
                { id: 50, type: 'regular', text: 'Find the underlined part that needs correction: Not have spent enough time...', options: ['A. have', 'B. didn\'t pass', 'C. on', 'D. enough'], correct: 0, explanation: 'have → having' },
                { id: 51, type: 'regular', text: 'Find the underlined part that needs correction: My brother participated... to testing his ideas...', options: ['A. participated in', 'B. to testing', 'C. about', 'D. promoting'], correct: 1, explanation: 'to testing → to test' },
                { id: 52, type: 'regular', text: 'Find the underlined part that needs correction: Ha Long Bay is the only... to recognize twice...', options: ['A. the only', 'B. in', 'C. to recognize', 'D. by'], correct: 2, explanation: 'to recognize → to be recognized' },
                { id: 53, type: 'regular', text: 'Find the underlined part that needs correction: In addition to enjoy our national parks...', options: ['A. In', 'B. enjoy', 'C. protect', 'D. for'], correct: 1, explanation: 'enjoy → enjoying' },

                { id: 55, type: 'regular', text: 'Find the underlined part that needs correction: Because poor wildlife management...', options: ['A. Because', 'B. wildlife management', 'C. rare', 'D. may not'], correct: 0, explanation: 'Because → Because of' },

                // Bài đọc 1 (65-69)
                { id: 65, type: 'reading', groupId: 1, text: '(1) __________', passage: 'It is not surprising that almost all first-year students have a lot of problems when they must live (1) __________ at university. At the first stage, due to not having a suitable schedule, they keep failing to meet deadlines. (2) Unlike high school where the homework is quite simple and just about what is taught in class, the college or university assignments require the students to do more research for its requirements and to complete within a given time. Another issue which often makes students stressed is that they don\'t have (3) enough money to pay for things. One reason for that problem is that some students don\'t (4) receive enough financial support from their parents to pay for both tuition fee and living costs. Another reason is that some students don\'t spend money in the right way. It\'s possible for college or university students to thoroughly solve the problems above. For example, they can plan carefully for their assignments or essays, make use (5) of modern technologies to study faster. Besides, they can work part-time to support themselves financially.', options: ['A. dependent', 'B. dependently', 'C. independent', 'D. independently'], correct: 3, explanation: 'live independently - sống độc lập' },

                { id: 67, type: 'reading', groupId: 1, text: '(3) __________', options: ['A. much', 'B. little', 'C. enough', 'D. lots of'], correct: 2, explanation: 'enough money - đủ tiền' },
                { id: 68, type: 'reading', groupId: 1, text: '(4) __________', options: ['A. give', 'B. donate', 'C. receive', 'D. distribute'], correct: 2, explanation: 'receive support - nhận hỗ trợ' },
                { id: 69, type: 'reading', groupId: 1, text: '(5) __________', options: ['A. of', 'B. on', 'C. with', 'D. in'], correct: 0, explanation: 'make use of - tận dụng' },
                
                // Bài đọc 2 (70-74)

        }

        // Tạo nhóm câu hỏi từ danh sách fullQuestions
        function buildQuestionGroups(questionList) {
            const groups = [];
            const regularQuestions = [];
            
            // Phân loại câu hỏi
            for (let q of questionList) {
                if (q.type === 'reading' && q.groupId) {
                    // Tìm hoặc tạo nhóm đọc
                    let group = groups.find(g => g.type === 'reading' && g.groupId === q.groupId);
                    if (!group) {
                        const groupInfo = READING_GROUPS.find(gr => {
                            return q.id >= gr.startId && q.id <= gr.endId;
                        });
                        group = {
                            type: 'reading',
                            groupId: q.groupId,
                            name: groupInfo ? groupInfo.name : `Bài đọc ${q.groupId}`,
                            passageText: q.passage || (groupInfo ? groupInfo.passageText : ''),
                            questions: [],
                            answeredCount: 0
                        };
                        groups.push(group);
                    }
                    group.questions.push(q);
                    // Sắp xếp câu hỏi trong nhóm theo id
                    group.questions.sort((a, b) => a.id - b.id);
                } else {
                    regularQuestions.push(q);
                }
            }
            
            // Thêm các câu thường vào groups (mỗi câu là 1 nhóm)
            for (let q of regularQuestions) {
                groups.push({
                    type: 'single',
                    question: q,
                    answered: false
                });
            }
            
            return groups;
        }

        // Random các nhóm (giữ nguyên thứ tự câu trong nhóm đọc)
        function shuffleGroups(groups) {
            for (let i = groups.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [groups[i], groups[j]] = [groups[j], groups[i]];
            }
            return groups;
        }

        function filterGroupsByMode(mode) {
            let filtered = [];
            
            if (mode === 'stress') {
                const stressQuestions = fullQuestions.filter(q => q.type === 'stress' || (q.id >= 1 && q.id <= 10));
                filtered = buildQuestionGroups(stressQuestions);
            } else if (mode === 'reading') {
                const readingQuestions = fullQuestions.filter(q => q.type === 'reading' || (q.id >= 65 && q.id <= 89));
                filtered = buildQuestionGroups(readingQuestions);
                // Lọc chỉ lấy nhóm đọc
                filtered = filtered.filter(g => g.type === 'reading');
            } else if (mode === 'regular') {
                const regularQuestions = fullQuestions.filter(q => q.type === 'regular' || (q.id >= 11 && q.id <= 64));
                filtered = buildQuestionGroups(regularQuestions);
                // Lọc chỉ lấy câu thường (không phải reading)
                filtered = filtered.filter(g => g.type === 'single');
            } else if (mode === 'all') {
                filtered = buildQuestionGroups(fullQuestions);
                filtered = shuffleGroups(filtered);
            }
            
            return filtered;
        }

        function initUserAnswersForGroups(groups) {
            const answers = [];
            for (let g of groups) {
                if (g.type === 'reading') {
                    const groupAnswers = {
                        type: 'reading',
                        groupId: g.groupId,
                        answers: new Array(g.questions.length).fill(null).map(() => ({ answered: false, selected: null })),
                        currentQuestionIdx: 0
                    };
                    answers.push(groupAnswers);
                } else {
                    answers.push({
                        type: 'single',
                        answered: false,
                        selected: null
                    });
                }
            }
            return answers;
        }

        function updateUI() {
            if (!questionGroups.length) {
                progress.innerHTML = '0 câu hỏi';
                scoreBoard.innerHTML = '📊 Không có câu hỏi';
                return;
            }
            
            let totalQuestions = 0;
            let answeredQuestions = 0;
            
            for (let i = 0; i < questionGroups.length; i++) {
                const g = questionGroups[i];
                const ans = userAnswers[i];
                if (g.type === 'reading') {
                    totalQuestions += g.questions.length;
                    for (let j = 0; j < g.questions.length; j++) {
                        if (ans && ans.answers && ans.answers[j] && ans.answers[j].answered) {
                            answeredQuestions++;
                        }
                    }
                } else {
                    totalQuestions++;
                    if (ans && ans.answered) answeredQuestions++;
                }
            }
            
            // Tính vị trí hiện tại
            let currentPosition = 1;
            for (let i = 0; i < currentGroupIndex; i++) {
                const g = questionGroups[i];
                if (g.type === 'reading') {
                    currentPosition += g.questions.length;
                } else {
                    currentPosition++;
                }
            }
            const currentAns = userAnswers[currentGroupIndex];
            if (currentAns && currentAns.type === 'reading') {
                currentPosition += currentAns.currentQuestionIdx;
            }
            
            progress.innerHTML = `Câu ${currentPosition} / ${totalQuestions} | Đã trả lời: ${answeredQuestions}/${totalQuestions}`;
            scoreBoard.innerHTML = `📊 Đã trả lời: ${answeredQuestions} / ${totalQuestions} câu | ${answeredQuestions === totalQuestions ? '✅ Hoàn thành!' : '📝 Tiếp tục nào!'}`;
            
            let modeName = '';
            if (currentMode === 'stress') modeName = '🔊 Trắc nghiệm Trọng âm';
            else if (currentMode === 'reading') modeName = '📖 Trắc nghiệm Đoạn văn';
            else if (currentMode === 'regular') modeName = '📝 Trắc nghiệm Thường';
            else if (currentMode === 'all') modeName = '🎲 Trắc nghiệm Toàn bộ (Random)';
            modeInfo.innerHTML = `Đang làm: ${modeName} | Tổng số: ${totalQuestions} câu`;
        }

        function renderCurrentQuestion() {
            if (!questionGroups.length || currentGroupIndex >= questionGroups.length) {
                questionCard.innerHTML = '<div class="no-questions">Không có câu hỏi nào</div>';
                return;
            }
            
            const group = questionGroups[currentGroupIndex];
            const ans = userAnswers[currentGroupIndex];
            
            if (group.type === 'reading') {
                const qIndex = ans.currentQuestionIdx;
                const question = group.questions[qIndex];
                const qAns = ans.answers[qIndex];
                const isAnswered = qAns.answered;
                
                let html = `
                    <div class="reading-group-info">
                        📖 ${group.name} - Câu ${qIndex + 1}/${group.questions.length}
                    </div>
                    <div class="passage-text">${escapeHtml(group.passageText)}</div>
                    <div class="question-text">${escapeHtml(question.text)}</div>
                `;
                
                html += `<div class="options">`;
                question.options.forEach((opt, idx) => {
                    let additionalClass = '';
                    if (isAnswered) {
                        if (qAns.selected === idx) {
                            additionalClass = (idx === question.correct) ? 'correct-answer' : 'wrong-answer';
                        }
                        if (idx === question.correct && qAns.selected !== idx) {
                            additionalClass = 'correct-answer';
                        }
                        additionalClass += ' disabled-opt';
                    }
                    html += `<button class="option-btn ${additionalClass}" data-opt-index="${idx}" ${isAnswered ? 'disabled' : ''}>${escapeHtml(opt)}</button>`;
                });
                html += `</div>`;
                
                html += `<div class="nav-buttons">
                            <button class="nav-btn prev-btn" id="prevBtn" ${currentGroupIndex === 0 && qIndex === 0 ? 'disabled' : ''}>◀ </button>
                            <button class="nav-btn reset-questions-btn" id="resetCurrentBtn">🔄 Làm lại</button>
                            <button class="nav-btn next-btn" id="nextBtn"> ▶</button>
                        </div>`;
                
                if (isAnswered && question.explanation) {
                    html += `<div class="explanation">💡 Giải thích: ${escapeHtml(question.explanation)}</div>`;
                }
                
                questionCard.innerHTML = html;
                
                if (!isAnswered) {
                    document.querySelectorAll('.option-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const selectedIdx = parseInt(btn.dataset.optIndex);
                            handleReadingAnswer(selectedIdx);
                        });
                    });
                }
                
                document.getElementById('prevBtn')?.addEventListener('click', () => goToPrevQuestion());
                document.getElementById('nextBtn')?.addEventListener('click', () => goToNextQuestion());
                document.getElementById('resetCurrentBtn')?.addEventListener('click', () => {
                    if (confirm(`Làm lại toàn bộ câu hỏi trong chế độ ${currentMode}?`)) {
                        startMode(currentMode);
                    }
                });
                
            } else {
                const question = group.question;
                const isAnswered = ans.answered;
                
                let html = `<div class="question-text">${escapeHtml(question.text)}</div>`;
                html += `<div class="options">`;
                question.options.forEach((opt, idx) => {
                    let additionalClass = '';
                    if (isAnswered) {
                        if (ans.selected === idx) {
                            additionalClass = (idx === question.correct) ? 'correct-answer' : 'wrong-answer';
                        }
                        if (idx === question.correct && ans.selected !== idx) {
                            additionalClass = 'correct-answer';
                        }
                        additionalClass += ' disabled-opt';
                    }
                    html += `<button class="option-btn ${additionalClass}" data-opt-index="${idx}" ${isAnswered ? 'disabled' : ''}>${escapeHtml(opt)}</button>`;
                });
                html += `</div>`;
                
                html += `<div class="nav-buttons">
                            <button class="nav-btn prev-btn" id="prevBtn" ${currentGroupIndex === 0 ? 'disabled' : ''}>◀ Câu trước</button>
                            <button class="nav-btn reset-questions-btn" id="resetCurrentBtn">🔄 Làm lại chế độ này</button>
                            <button class="nav-btn next-btn" id="nextBtn">Câu tiếp theo ▶</button>
                        </div>`;
                
                if (isAnswered && question.explanation) {
                    html += `<div class="explanation">💡 Giải thích: ${escapeHtml(question.explanation)}</div>`;
                }
                
                questionCard.innerHTML = html;
                
                if (!isAnswered) {
                    document.querySelectorAll('.option-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const selectedIdx = parseInt(btn.dataset.optIndex);
                            handleSingleAnswer(selectedIdx);
                        });
                    });
                }
                
                document.getElementById('prevBtn')?.addEventListener('click', () => goToPrevQuestion());
                document.getElementById('nextBtn')?.addEventListener('click', () => goToNextQuestion());
                document.getElementById('resetCurrentBtn')?.addEventListener('click', () => {
                    if (confirm(`Làm lại toàn bộ câu hỏi trong chế độ ${currentMode}?`)) {
                        startMode(currentMode);
                    }
                });
            }
        }
        
        function handleReadingAnswer(selectedIdx) {
            const group = questionGroups[currentGroupIndex];
            const ans = userAnswers[currentGroupIndex];
            const qIndex = ans.currentQuestionIdx;
            const question = group.questions[qIndex];
            
            ans.answers[qIndex] = {
                answered: true,
                selected: selectedIdx
            };
            renderCurrentQuestion();
            updateUI();
        }
        
        function handleSingleAnswer(selectedIdx) {
            const group = questionGroups[currentGroupIndex];
            const ans = userAnswers[currentGroupIndex];
            const question = group.question;
            
            ans.answered = true;
            ans.selected = selectedIdx;
            renderCurrentQuestion();
            updateUI();
        }
        
        function goToPrevQuestion() {
            const group = questionGroups[currentGroupIndex];
            const ans = userAnswers[currentGroupIndex];
            
            if (group.type === 'reading') {
                if (ans.currentQuestionIdx > 0) {
                    ans.currentQuestionIdx--;
                    renderCurrentQuestion();
                    updateUI();
                } else if (currentGroupIndex > 0) {
                    currentGroupIndex--;
                    const prevGroup = questionGroups[currentGroupIndex];
                    const prevAns = userAnswers[currentGroupIndex];
                    if (prevGroup.type === 'reading') {
                        prevAns.currentQuestionIdx = prevGroup.questions.length - 1;
                    }
                    renderCurrentQuestion();
                    updateUI();
                }
            } else {
                if (currentGroupIndex > 0) {
                    currentGroupIndex--;
                    renderCurrentQuestion();
                    updateUI();
                }
            }
        }
        
        function goToNextQuestion() {
            const group = questionGroups[currentGroupIndex];
            const ans = userAnswers[currentGroupIndex];
            
            if (group.type === 'reading') {
                if (ans.currentQuestionIdx < group.questions.length - 1) {
                    ans.currentQuestionIdx++;
                    renderCurrentQuestion();
                    updateUI();
                } else if (currentGroupIndex < questionGroups.length - 1) {
                    currentGroupIndex++;
                    renderCurrentQuestion();
                    updateUI();
                }
            } else {
                if (currentGroupIndex < questionGroups.length - 1) {
                    currentGroupIndex++;
                    renderCurrentQuestion();
                    updateUI();
                }
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&#39;');
        }
        
        function startMode(mode) {
            currentMode = mode;
            questionGroups = filterGroupsByMode(mode);
            
            if (questionGroups.length === 0) {
                questionCard.innerHTML = '<div class="no-questions">Không có câu hỏi nào cho chế độ này</div>';
                progress.innerHTML = '0 câu hỏi';
                scoreBoard.innerHTML = '📊 Không có câu hỏi';
                modeInfo.innerHTML = `Chế độ: ${mode} - Không có câu hỏi`;
                return;
            }
            
            userAnswers = initUserAnswersForGroups(questionGroups);
            currentGroupIndex = 0;
            renderCurrentQuestion();
            updateUI();
            
            document.querySelectorAll('.mode-btn').forEach(btn => {
                if (btn.dataset.mode === mode) {
                    btn.classList.add('active');
                } else if (btn.id !== 'resetAllBtn') {
                    btn.classList.remove('active');
                }
            });
        }
        
        function resetAll() {
            if (currentMode) {
                startMode(currentMode);
            } else {
                questionCard.innerHTML = '<div class="no-questions">Vui lòng chọn một chế độ làm bài ở trên</div>';
                progress.innerHTML = 'Chưa có câu hỏi';
                scoreBoard.innerHTML = '📊 Chọn chế độ để bắt đầu';
                modeInfo.innerHTML = 'Chọn chế độ làm bài';
            }
        }
        
        document.querySelectorAll('.mode-btn').forEach(btn => {
            if (btn.id === 'resetAllBtn') {
                btn.addEventListener('click', () => {
                    if (confirm('Làm lại toàn bộ? Câu trả lời sẽ bị xóa.')) {
                        resetAll();
                    }
                });
            } else {
                btn.addEventListener('click', () => {
                    const mode = btn.dataset.mode;
                    startMode(mode);
                });
            }
        });
        
        loadQuestions();
    </script>
