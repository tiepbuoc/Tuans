<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn tập Tiếng Anh - 4 Chế Độ (Nhóm bài đọc)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .mode-bar {
            background: white;
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .mode-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #f0f0f0;
            color: #333;
        }

        .mode-btn:hover {
            transform: translateY(-2px);
        }

        .mode-btn.active {
            background: #1e3c72;
            color: white;
            box-shadow: 0 4px 12px rgba(30,60,114,0.3);
        }

        .mode-btn.reset-mode {
            background: #ff9800;
            color: white;
        }

        .mode-btn.reset-mode:hover {
            background: #e68900;
        }

        .quiz-header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        .quiz-header h1 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 1.5em;
        }

        .quiz-header .mode-info {
            color: #ff9800;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .quiz-header .progress {
            color: #666;
            margin-top: 10px;
            font-size: 1.1em;
        }

        .question-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.15em;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .passage-text {
            background: #f0f7ff;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #3498db;
            line-height: 1.6;
            white-space: pre-wrap;
            font-size: 0.95em;
            max-height: 400px;
            overflow-y: auto;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        .option-btn {
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            font-size: 1em;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }

        .option-btn.correct-answer {
            background: #27ae60;
            border-color: #1e8449;
            color: white;
        }

        .option-btn.wrong-answer {
            background: #e74c3c;
            border-color: #c0392b;
            color: white;
        }

        .option-btn.disabled-opt {
            cursor: default;
            opacity: 0.9;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
        }

        .prev-btn {
            background: #7f8c8d;
            color: white;
        }

        .next-btn {
            background: #2c3e50;
            color: white;
        }

        .reset-questions-btn {
            background: #e67e22;
            color: white;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: default;
        }

        .explanation {
            margin-top: 20px;
            padding: 12px;
            background: #f0f7ff;
            border-radius: 8px;
            border-left: 4px solid #3498db;
            font-size: 0.9em;
        }

        .score-board {
            background: white;
            border-radius: 15px;
            padding: 12px 20px;
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1em;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .no-questions {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .reading-group-info {
            background: #e8f5e9;
            padding: 8px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.85em;
            color: #2e7d32;
            text-align: center;
        }

        @media (max-width: 600px) {
            .question-card {
                padding: 18px;
            }
            .mode-btn {
                padding: 8px 16px;
                font-size: 0.85em;
            }
            .nav-btn {
                padding: 8px 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mode-bar">
            <button class="mode-btn" data-mode="stress">🔊 Trắc nghiệm Trọng âm</button>
            <button class="mode-btn" data-mode="reading">📖 Trắc nghiệm Đoạn văn</button>
            <button class="mode-btn" data-mode="regular">📝 Trắc nghiệm Thường</button>
            <button class="mode-btn" data-mode="all">🎲 Trắc nghiệm Toàn bộ (Random)</button>
            <button class="mode-btn reset-mode" id="resetAllBtn">🔄 Làm lại toàn bộ</button>
        </div>

        <div class="quiz-header">
            <div class="mode-info" id="modeInfo">Chọn chế độ làm bài</div>
            <div class="progress" id="progress">Chưa có câu hỏi</div>
        </div>

        <div class="question-card" id="questionCard">
            <div class="no-questions">Vui lòng chọn một chế độ làm bài ở trên</div>
        </div>

        <div class="score-board" id="scoreBoard">
            📊 Chọn chế độ để bắt đầu
        </div>
    </div>

    <script>
        let fullQuestions = [];

        // Định nghĩa các nhóm bài đọc theo ID range
        const READING_GROUPS = [
            { name: "Bài 1: Sinh viên năm nhất", startId: 65, endId: 69, passageText: null, passageFull: null },
            { name: "Bài 2: Quản lý thời gian", startId: 70, endId: 74, passageText: null, passageFull: null },
            { name: "Bài 3: Thánh địa Mỹ Sơn", startId: 75, endId: 79, passageText: null, passageFull: null },
            { name: "Bài 4: Bảo tồn di sản", startId: 80, endId: 84, passageText: null, passageFull: null },
            { name: "Bài 5: Đại học Mở", startId: 85, endId: 89, passageText: null, passageFull: null }
        ];

        let currentMode = null;
        let questionGroups = [];
        let currentGroupIndex = 0;
        let userAnswers = [];

        const modeInfo = document.getElementById('modeInfo');
        const progress = document.getElementById('progress');
        const questionCard = document.getElementById('questionCard');
        const scoreBoard = document.getElementById('scoreBoard');

        // Hàm lấy dữ liệu từ file JSON
        async function loadQuestions() {
            try {
                const response = await fetch('english_questions.json');
                const data = await response.json();
                fullQuestions = data.questions;
                console.log(`Đã tải ${fullQuestions.length} câu hỏi`);
                extractPassagesFromQuestions();
            } catch (error) {
                console.error('Không tìm thấy file JSON:', error);
                alert('Không thể tải file english_questions.json. Vui lòng kiểm tra lại.');
            }
        }

        // Trích xuất đoạn văn từ câu hỏi đầu tiên của mỗi bài
        function extractPassagesFromQuestions() {
            for (let group of READING_GROUPS) {
                const firstQuestion = fullQuestions.find(q => q.id === group.startId);
                if (firstQuestion && firstQuestion.text) {
                    const text = firstQuestion.text;
                    // Tìm đoạn văn (phần trước dòng "Question (1)")
                    const passageMatch = text.match(/^(.*?)(?=\n\nQuestion|\nQuestion|Question\s*\(\d+\))/s);
                    if (passageMatch && passageMatch[1].length > 50) {
                        group.passageFull = passageMatch[1].trim();
                        // Loại bỏ đoạn văn khỏi text của câu hỏi đầu, chỉ giữ lại câu hỏi
                        const questionOnly = text.replace(passageMatch[1], '').trim();
                        if (questionOnly) firstQuestion.text = questionOnly;
                    } else {
                        group.passageFull = "Đoạn văn đang được cập nhật...";
                    }
                }
            }
        }

        // Lấy đoạn văn của một bài theo ID
        function getPassageText(questionId) {
            const group = READING_GROUPS.find(g => questionId >= g.startId && questionId <= g.endId);
            return group ? group.passageFull : null;
        }

        // Lấy tên bài theo ID
        function getGroupName(questionId) {
            const group = READING_GROUPS.find(g => questionId >= g.startId && questionId <= g.endId);
            return group ? group.name : null;
        }

        // Kiểm tra xem câu hỏi có phải là reading không
        function isReadingQuestion(q) {
            return q.id >= 65 && q.id <= 89;
        }

        // Xây dựng các nhóm câu hỏi
        function buildQuestionGroups(questionList) {
            const groups = [];
            const readingMap = new Map(); // Map<groupId, { group, questions }>
            
            // Phân loại câu hỏi
            for (let q of questionList) {
                if (isReadingQuestion(q)) {
                    const groupInfo = READING_GROUPS.find(g => q.id >= g.startId && q.id <= g.endId);
                    if (groupInfo) {
                        if (!readingMap.has(groupInfo.startId)) {
                            readingMap.set(groupInfo.startId, {
                                type: 'reading',
                                groupId: groupInfo.startId,
                                name: groupInfo.name,
                                passageText: groupInfo.passageFull,
                                questions: [],
                                answeredCount: 0
                            });
                        }
                        readingMap.get(groupInfo.startId).questions.push(q);
                    } else {
                        groups.push({ type: 'single', question: q });
                    }
                } else {
                    groups.push({ type: 'single', question: q });
                }
            }
            
            // Sắp xếp câu hỏi trong mỗi nhóm đọc theo id
            for (let [_, group] of readingMap) {
                group.questions.sort((a, b) => a.id - b.id);
                groups.push(group);
            }
            
            return groups;
        }

        // Random các nhóm
        function shuffleGroups(groups) {
            for (let i = groups.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [groups[i], groups[j]] = [groups[j], groups[i]];
            }
            return groups;
        }

        // Lọc theo chế độ
        function filterGroupsByMode(mode) {
            let filtered = [];
            let questionsToFilter = [...fullQuestions];
            
            if (mode === 'stress') {
                questionsToFilter = fullQuestions.filter(q => q.id >= 1 && q.id <= 10);
                filtered = buildQuestionGroups(questionsToFilter);
            } else if (mode === 'reading') {
                questionsToFilter = fullQuestions.filter(q => q.id >= 65 && q.id <= 89);
                filtered = buildQuestionGroups(questionsToFilter);
                filtered = filtered.filter(g => g.type === 'reading');
            } else if (mode === 'regular') {
                questionsToFilter = fullQuestions.filter(q => (q.id >= 11 && q.id <= 64));
                filtered = buildQuestionGroups(questionsToFilter);
                filtered = filtered.filter(g => g.type === 'single');
            } else if (mode === 'all') {
                filtered = buildQuestionGroups(fullQuestions);
                filtered = shuffleGroups(filtered);
            }
            
            return filtered;
        }

        // Khởi tạo userAnswers
        function initUserAnswersForGroups(groups) {
            const answers = [];
            for (let g of groups) {
                if (g.type === 'reading') {
                    answers.push({
                        type: 'reading',
                        groupId: g.groupId,
                        answers: g.questions.map(() => ({ answered: false, selected: null })),
                        currentQuestionIdx: 0
                    });
                } else {
                    answers.push({ type: 'single', answered: false, selected: null });
                }
            }
            return answers;
        }

        // Cập nhật UI
        function updateUI() {
            if (!questionGroups.length) {
                progress.innerHTML = '0 câu hỏi';
                scoreBoard.innerHTML = '📊 Không có câu hỏi';
                return;
            }
            
            let totalQuestions = 0;
            let answeredQuestions = 0;
            
            for (let i = 0; i < questionGroups.length; i++) {
                const g = questionGroups[i];
                const ans = userAnswers[i];
                if (g.type === 'reading') {
                    totalQuestions += g.questions.length;
                    for (let j = 0; j < g.questions.length; j++) {
                        if (ans && ans.answers && ans.answers[j] && ans.answers[j].answered) answeredQuestions++;
                    }
                } else {
                    totalQuestions++;
                    if (ans && ans.answered) answeredQuestions++;
                }
            }
            
            // Tính vị trí hiện tại
            let currentPosition = 1;
            for (let i = 0; i < currentGroupIndex; i++) {
                const g = questionGroups[i];
                if (g.type === 'reading') currentPosition += g.questions.length;
                else currentPosition++;
            }
            const currentAns = userAnswers[currentGroupIndex];
            if (currentAns && currentAns.type === 'reading') {
                currentPosition += currentAns.currentQuestionIdx;
            }
            
            progress.innerHTML = `Câu ${currentPosition} / ${totalQuestions} | Đã trả lời: ${answeredQuestions}/${totalQuestions}`;
            scoreBoard.innerHTML = `📊 Đã trả lời: ${answeredQuestions} / ${totalQuestions} câu | ${answeredQuestions === totalQuestions ? '✅ Hoàn thành!' : '📝 Tiếp tục nào!'}`;
            
            let modeName = '';
            if (currentMode === 'stress') modeName = '🔊 Trắc nghiệm Trọng âm (10 câu)';
            else if (currentMode === 'reading') modeName = '📖 Trắc nghiệm Đoạn văn (25 câu - 5 bài)';
            else if (currentMode === 'regular') modeName = '📝 Trắc nghiệm Thường (54 câu)';
            else if (currentMode === 'all') modeName = '🎲 Trắc nghiệm Toàn bộ (89 câu - Random nhóm)';
            modeInfo.innerHTML = `Đang làm: ${modeName}`;
        }

        // Render câu hỏi hiện tại
        function renderCurrentQuestion() {
            if (!questionGroups.length || currentGroupIndex >= questionGroups.length) {
                questionCard.innerHTML = '<div class="no-questions">Không có câu hỏi nào</div>';
                return;
            }
            
            const group = questionGroups[currentGroupIndex];
            const ans = userAnswers[currentGroupIndex];
            
            if (group.type === 'reading') {
                const qIndex = ans.currentQuestionIdx;
                const question = group.questions[qIndex];
                const qAns = ans.answers[qIndex];
                const isAnswered = qAns.answered;
                
                let html = `
                    <div class="reading-group-info">
                        📖 ${group.name} - Câu ${qIndex + 1}/${group.questions.length}
                    </div>
                `;
                
                if (group.passageText) {
                    html += `<div class="passage-text">${escapeHtml(group.passageText)}</div>`;
                }
                
                html += `<div class="question-text">${escapeHtml(question.text)}</div>`;
                html += `<div class="options">`;
                
                question.options.forEach((opt, idx) => {
                    let additionalClass = '';
                    if (isAnswered) {
                        if (qAns.selected === idx) additionalClass = (idx === question.correct) ? 'correct-answer' : 'wrong-answer';
                        if (idx === question.correct && qAns.selected !== idx) additionalClass = 'correct-answer';
                        additionalClass += ' disabled-opt';
                    }
                    html += `<button class="option-btn ${additionalClass}" data-opt-index="${idx}" ${isAnswered ? 'disabled' : ''}>${escapeHtml(opt)}</button>`;
                });
                html += `</div>`;
                
                html += `<div class="nav-buttons">
                            <button class="nav-btn prev-btn" id="prevBtn">◀ </button>
                            <button class="nav-btn reset-questions-btn" id="resetCurrentBtn">🔄 Làm lại</button>
                            <button class="nav-btn next-btn" id="nextBtn"> ▶</button>
                        </div>`;
                
                if (isAnswered && question.explanation) {
                    html += `<div class="explanation">💡 Giải thích: ${escapeHtml(question.explanation)}</div>`;
                }
                
                questionCard.innerHTML = html;
                
                if (!isAnswered) {
                    document.querySelectorAll('.option-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const selectedIdx = parseInt(btn.dataset.optIndex);
                            handleReadingAnswer(selectedIdx);
                        });
                    });
                }
                
                document.getElementById('prevBtn')?.addEventListener('click', () => goToPrevQuestion());
                document.getElementById('nextBtn')?.addEventListener('click', () => goToNextQuestion());
                document.getElementById('resetCurrentBtn')?.addEventListener('click', () => {
                    if (confirm(`Làm lại toàn bộ câu hỏi trong chế độ ${currentMode}?`)) startMode(currentMode);
                });
                
            } else {
                const question = group.question;
                const isAnswered = ans.answered;
                
                let html = `<div class="question-text">${escapeHtml(question.text)}</div>`;
                html += `<div class="options">`;
                
                question.options.forEach((opt, idx) => {
                    let additionalClass = '';
                    if (isAnswered) {
                        if (ans.selected === idx) additionalClass = (idx === question.correct) ? 'correct-answer' : 'wrong-answer';
                        if (idx === question.correct && ans.selected !== idx) additionalClass = 'correct-answer';
                        additionalClass += ' disabled-opt';
                    }
                    html += `<button class="option-btn ${additionalClass}" data-opt-index="${idx}" ${isAnswered ? 'disabled' : ''}>${escapeHtml(opt)}</button>`;
                });
                html += `</div>`;
                
                html += `<div class="nav-buttons">
                            <button class="nav-btn prev-btn" id="prevBtn" ${currentGroupIndex === 0 ? 'disabled' : ''}>◀ </button>
                            <button class="nav-btn reset-questions-btn" id="resetCurrentBtn">🔄 Làm lại</button>
                            <button class="nav-btn next-btn" id="nextBtn"> ▶</button>
                        </div>`;
                
                if (isAnswered && question.explanation) {
                    html += `<div class="explanation">💡 Giải thích: ${escapeHtml(question.explanation)}</div>`;
                }
                
                questionCard.innerHTML = html;
                
                if (!isAnswered) {
                    document.querySelectorAll('.option-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const selectedIdx = parseInt(btn.dataset.optIndex);
                            handleSingleAnswer(selectedIdx);
                        });
                    });
                }
                
                document.getElementById('prevBtn')?.addEventListener('click', () => goToPrevQuestion());
                document.getElementById('nextBtn')?.addEventListener('click', () => goToNextQuestion());
                document.getElementById('resetCurrentBtn')?.addEventListener('click', () => {
                    if (confirm(`Làm lại toàn bộ câu hỏi trong chế độ ${currentMode}?`)) startMode(currentMode);
                });
            }
        }
        
        function handleReadingAnswer(selectedIdx) {
            const ans = userAnswers[currentGroupIndex];
            const qIndex = ans.currentQuestionIdx;
            ans.answers[qIndex] = { answered: true, selected: selectedIdx };
            renderCurrentQuestion();
            updateUI();
        }
        
        function handleSingleAnswer(selectedIdx) {
            const ans = userAnswers[currentGroupIndex];
            ans.answered = true;
            ans.selected = selectedIdx;
            renderCurrentQuestion();
            updateUI();
        }
        
        function goToPrevQuestion() {
            const group = questionGroups[currentGroupIndex];
            const ans = userAnswers[currentGroupIndex];
            
            if (group.type === 'reading') {
                if (ans.currentQuestionIdx > 0) {
                    ans.currentQuestionIdx--;
                    renderCurrentQuestion();
                    updateUI();
                } else if (currentGroupIndex > 0) {
                    currentGroupIndex--;
                    const prevAns = userAnswers[currentGroupIndex];
                    if (prevAns.type === 'reading') prevAns.currentQuestionIdx = prevAns.answers.length - 1;
                    renderCurrentQuestion();
                    updateUI();
                }
            } else {
                if (currentGroupIndex > 0) {
                    currentGroupIndex--;
                    renderCurrentQuestion();
                    updateUI();
                }
            }
        }
        
        function goToNextQuestion() {
            const group = questionGroups[currentGroupIndex];
            const ans = userAnswers[currentGroupIndex];
            
            if (group.type === 'reading') {
                if (ans.currentQuestionIdx < group.questions.length - 1) {
                    ans.currentQuestionIdx++;
                    renderCurrentQuestion();
                    updateUI();
                } else if (currentGroupIndex < questionGroups.length - 1) {
                    currentGroupIndex++;
                    renderCurrentQuestion();
                    updateUI();
                }
            } else {
                if (currentGroupIndex < questionGroups.length - 1) {
                    currentGroupIndex++;
                    renderCurrentQuestion();
                    updateUI();
                }
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
        
        function startMode(mode) {
            currentMode = mode;
            questionGroups = filterGroupsByMode(mode);
            
            if (questionGroups.length === 0) {
                questionCard.innerHTML = '<div class="no-questions">Không có câu hỏi nào cho chế độ này</div>';
                progress.innerHTML = '0 câu hỏi';
                scoreBoard.innerHTML = '📊 Không có câu hỏi';
                modeInfo.innerHTML = `Chế độ: ${mode} - Không có câu hỏi`;
                return;
            }
            
            userAnswers = initUserAnswersForGroups(questionGroups);
            currentGroupIndex = 0;
            renderCurrentQuestion();
            updateUI();
            
            document.querySelectorAll('.mode-btn').forEach(btn => {
                if (btn.dataset.mode === mode) btn.classList.add('active');
                else if (btn.id !== 'resetAllBtn') btn.classList.remove('active');
            });
        }
        
        function resetAll() {
            if (currentMode) startMode(currentMode);
            else {
                questionCard.innerHTML = '<div class="no-questions">Vui lòng chọn một chế độ làm bài ở trên</div>';
                progress.innerHTML = 'Chưa có câu hỏi';
                scoreBoard.innerHTML = '📊 Chọn chế độ để bắt đầu';
                modeInfo.innerHTML = 'Chọn chế độ làm bài';
            }
        }
        
        document.querySelectorAll('.mode-btn').forEach(btn => {
            if (btn.id === 'resetAllBtn') {
                btn.addEventListener('click', () => { if (confirm('Làm lại toàn bộ?')) resetAll(); });
            } else {
                btn.addEventListener('click', () => startMode(btn.dataset.mode));
            }
        });
        
        loadQuestions();
    </script>
</body>
</html>
