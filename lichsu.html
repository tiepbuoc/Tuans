<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Đề cương lịch sử - Ôn tập thông minh</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #f0f5fa 0%, #e6ecf3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .card {
            max-width: 900px;
            width: 100%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(0, 20, 40, 0.2), 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255,255,255,0.5);
            overflow: hidden;
            padding: 24px 20px;
        }

        .header {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }

        .title-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .title-section h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0b3954, #1f5e8e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .title-icon {
            background: #2271b1;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 12px 18px -6px #2271b180;
        }

        .progress-panel {
            background: white;
            border-radius: 100px;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.03), 0 8px 12px -8px #a0bace;
            border: 1px solid #deecfb;
        }

        .q-counter {
            background: #eef3fc;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: #11517c;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .score-badge {
            background: #0e2c41;
            padding: 8px 22px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 6px 12px #0e2c4130;
        }

        /* main content */
        .question-container {
            background: #ffffffd9;
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 24px 20px;
            margin: 20px 0 10px;
            border: 1px solid #ffffff;
            box-shadow: 0 10px 25px -10px #1f4e7a30;
        }

        .part-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #deecfb;
            border-radius: 60px;
            padding: 8px 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #023b66;
            margin-bottom: 22px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .question-text {
            font-size: 1.18rem;
            font-weight: 550;
            color: #0f2f45;
            line-height: 1.45;
            margin-bottom: 28px;
            word-break: break-word;
        }

        /* passage / cloze */
        .passage-box {
            background: #eaf3fe;
            border-radius: 28px;
            padding: 22px;
            margin-bottom: 28px;
            font-style: italic;
            border-left: 6px solid #2271b1;
            color: #183f60;
            font-size: 1rem;
            line-height: 1.6;
            box-shadow: inset 0 2px 5px #c9dbf0;
        }

        /* options */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 28px;
        }

        .option-item {
            background: white;
            border: 2px solid #dbe4f0;
            border-radius: 60px;
            padding: 16px 22px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.12s;
            cursor: pointer;
            box-shadow: 0 4px 8px #cddff0;
        }

        .option-item:hover {
            border-color: #3f8bcb;
            transform: scale(1.01);
            background: #f3faff;
        }

        .option-item.selected {
            border-color: #0369a1;
            background: #e2f0ff;
            box-shadow: 0 10px 18px -10px #0369a1;
        }

        .option-marker {
            width: 36px;
            height: 36px;
            background: #f0f7ff;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #175a88;
            border: 1px solid #b5d2f0;
        }

        .option-item.selected .option-marker {
            background: #0369a1;
            color: white;
            border-color: white;
        }

        .option-text {
            font-size: 1.08rem;
            font-weight: 500;
            color: #0c3f5e;
            flex: 1;
        }

        /* fill form */
        .fill-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 20px 0;
        }

        .original-word {
            background: #e2ecf9;
            border-radius: 60px;
            padding: 15px 25px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            font-weight: 500;
        }

        .original-word span {
            background: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-weight: 600;
            color: #022c44;
        }

        .fill-input {
            width: 100%;
            padding: 18px 25px;
            border: 2px solid #c9dcf2;
            border-radius: 60px;
            font-size: 1.05rem;
            background: white;
            transition: 0.15s;
        }

        .fill-input:focus {
            border-color: #0369a1;
            outline: none;
            box-shadow: 0 0 0 4px #9ec6f0;
        }

        /* error correction */
        .error-sentence {
            background: #f5faff;
            border-radius: 40px;
            padding: 28px 22px;
            font-size: 1.2rem;
            line-height: 2.4;
            margin: 20px 0;
            border: 2px solid #bed6f0;
        }

        .error-token {
            display: inline-block;
            background: white;
            border: 2px solid #7aa8d0;
            border-radius: 60px;
            padding: 8px 22px;
            margin: 0 5px;
            font-weight: 600;
            color: #0a3f64;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 4px 8px #bdd2ea;
        }

        .error-token.selected {
            background: #0369a1;
            border-color: #023b5c;
            color: white;
            box-shadow: 0 10px 18px -6px #0369a1;
        }

        /* rearrange */
        .rearrange-pool {
            background: #deecfb;
            border-radius: 40px;
            padding: 22px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 25px 0 20px;
            border: 2px dashed #538ec7;
        }

        .chunk {
            background: white;
            padding: 14px 26px;
            border-radius: 60px;
            font-weight: 550;
            border: 1px solid #8db6e0;
            box-shadow: 0 6px 12px #b3cef0;
            cursor: grab;
            user-select: none;
            font-size: 1rem;
        }

        .dropzone {
            background: #ffffff;
            border-radius: 40px;
            padding: 22px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            min-height: 100px;
            border: 3px solid #5d9bd5;
            margin-bottom: 20px;
        }

        .action-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin: 18px 0 10px;
        }

        .btn {
            background: white;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 1.5px solid #c5d9f0;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 6px 14px #d4e2f5;
        }

        .btn-primary {
            background: #0369a1;
            color: white;
            border: none;
            box-shadow: 0 16px 24px -8px #0369a1;
        }

        .btn:active { transform: scale(0.97); }

        .feedback-box {
            background: #f6fbfe;
            border-radius: 50px;
            padding: 22px 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-top: 28px;
            border: 1px solid #c2dbf2;
        }

        .correct-badge {
            background: #e0f7e6;
            color: #0b6e31;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 600;
        }

        .wrong-badge {
            background: #ffe8e8;
            color: #aa1e1e;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 600;
        }

        /* summary */
        .summary-screen {
            background: #eaf3fe;
            border-radius: 60px;
            padding: 40px 25px;
            text-align: center;
        }

        .big-score {
            font-size: 3.5rem;
            font-weight: 800;
            background: white;
            display: inline-block;
            padding: 25px 55px;
            border-radius: 200px;
            margin: 25px 0;
            color: #11517c;
            box-shadow: 0 20px 30px #9ebfe0;
        }

        /* responsive */
        @media (min-width: 700px) {
            .card { padding: 30px 35px; }
            .title-section h1 { font-size: 2.4rem; }
            .question-text { font-size: 1.28rem; }
        }

        /* disable interactions after submit */
        .readonly .option-item,
        .readonly .error-token,
        .readonly .chunk,
        .readonly .fill-input {
            pointer-events: none;
            opacity: 0.8;
        }

        .option-item.correct-opt {
            border-color: #1e8252;
            background: #c5f0d0;
        }

        .option-item.wrong-opt {
            border-color: #ba4b4b;
            background: #ffdede;
        }

        .option-item.selected-opt {
            border-color: #0369a1;
            background: #e2f0ff;
        }

        .option-item.correct-opt .option-marker {
            background: #1e8252;
            color: white;
            border-color: white;
        }

        .option-item.wrong-opt .option-marker {
            background: #ba4b4b;
            color: white;
            border-color: white;
        }

        .option-item.selected-opt .option-marker {
            background: #0369a1;
            color: white;
            border-color: white;
        }
    </style>
</head>
<body>
<div class="card" id="examContainer">
    <div class="header">
        <div class="title-section">
            <div class="title-icon"><i class="fas fa-landmark"></i></div>
            <h1>Đề cương lịch sử</h1>
            <a href="index.html" class="btn">🏠 Về Home</a>
        </div>
        <div class="progress-panel">
            <div class="q-counter"><i class="fas fa-question-circle"></i> <span id="currentQ">0</span>/<span id="totalQ">0</span></div>
            <div class="score-badge"><i class="fas fa-check-circle"></i> <span id="correctCount">0</span> đúng · <span id="wrongCount">0</span> sai</div>
        </div>
    </div>

    <!-- Màn hình bắt đầu -->
    <div id="startScreen" class="summary-screen">
        <i class="fas fa-graduation-cap" style="font-size:3rem; color:#11517c;"></i>
        <h2>Đề cương lịch sử</h2>
        <button id="startBtn" class="btn btn-primary" style="font-size: 1.5rem; padding: 18px 60px;">BẮT ĐẦU</button>
    </div>

    <!-- Màn hình làm bài (ẩn ban đầu) -->
    <div id="examScreen" class="hidden">
        <!-- Khu vực hiển thị câu hỏi (biến động theo loại) -->
        <div id="questionPanel" class="question-container">
            <!-- sẽ được fill bằng js -->
        </div>

        <div class="action-row">
            <button id="nextBtn" class="btn btn-primary" disabled>⏩ Câu tiếp</button>
            <button id="restartBtn">↻ Làm lại</button>
        </div>
    </div>

    <!-- Màn hình kết quả (ẩn) -->
    <div id="resultScreen" class="summary-screen hidden">
        <i class="fas fa-graduation-cap" style="font-size:3rem; color:#11517c;"></i>
        <h2>Hoàn thành đề cương</h2>
        <div class="big-score" id="bigScore">0/0</div>
        <div style="font-size:1.3rem; margin:10px 0 30px;">✅ Đúng: <span id="correctCountResult">0</span>  ❌ Sai: <span id="wrongCountResult">0</span></div>
        <button id="newExamBtn" class="btn btn-primary">🔄 Thi lại (xáo đề mới)</button>
    </div>
</div>

<script>
    (function() {
        // ---------- Dữ liệu gốc (sẽ load từ de.json) ----------
        let originalData = null;
        // Các mảng đã xáo cho bài thi hiện tại
        let shuffledQuestions = [];        // mảng các item: loại, nội dung, đáp án, v.v.
        let currentIndex = 0;              // index câu hiện tại
        let userAnswers = [];               // lưu câu trả lời của user: { selectedIdx, isCorrect, ... }
        let examInProgress = false;

        // DOM elements
        const startScreen = document.getElementById('startScreen');
        const examScreen = document.getElementById('examScreen');
        const resultScreen = document.getElementById('resultScreen');
        const questionPanel = document.getElementById('questionPanel');
        const correctCountResult = document.getElementById('correctCountResult');
        const wrongCountResult = document.getElementById('wrongCountResult');
        const bigScore = document.getElementById('bigScore');
        const currentQSpan = document.getElementById('currentQ');
        const totalQSpan = document.getElementById('totalQ');
        const correctSpan = document.getElementById('correctCount');
        const wrongSpan = document.getElementById('wrongCount');

        // ----- Hàm xáo trộn mảng (Fisher–Yates) -----
        function shuffleArray(arr) {
            if (!arr || !Array.isArray(arr)) return arr;
            const copy = [...arr];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        // Xáo đáp án trong câu trắc nghiệm (trả về item mới với dap_an và dap_an_dung đã điều chỉnh)
        function shuffleOptionsInMCQ(item) {
            const options = item.dap_an.map((text, idx) => ({ text, origIdx: idx }));
            const shuffledOpts = shuffleArray(options);
            const newOptionsText = shuffledOpts.map(o => o.text);
            // tìm vị trí mới của đáp án đúng (dựa vào origIdx)
            const correctOrig = item.dap_an_dung; // 0,1,2,3
            let newCorrectIndex = shuffledOpts.findIndex(o => o.origIdx === correctOrig);
            return {
                cau_hoi: item.cau_hoi,
                dap_an: newOptionsText,
                dap_an_dung: newCorrectIndex,
                loai: 'tracnghiem'
            };
        }

        // Chuyển câu đúng/sai thành dạng thống nhất (mỗi ý là một câu riêng)
        function flattenDungSaiBlocks(dsArray) {
            const flat = [];
            if (!dsArray) return flat;
            dsArray.forEach((block, blockIdx) => {
                const doan = block.doan_tu_lieu || '';
                const cauHoiList = block.cau_hoi || [];
                cauHoiList.forEach((item, idx) => {
                    flat.push({
                        loai: 'dungsai',
                        doan_tu_lieu: doan,
                        noi_dung: item.noi_dung,
                        dap_an_dung: item.dap_an, // boolean true/false
                        originalBlockIdx: blockIdx,
                        originalItemIdx: idx
                    });
                });
            });
            return flat;
        }

        // ----- Tạo đề thi xáo trộn hoàn chỉnh từ originalData -----
        function buildShuffledExam() {
            if (!originalData) return [];

            // 1. Trắc nghiệm: xáo câu, và trong mỗi câu xáo đáp án
            const rawTN = originalData.trac_nghiem || [];
            const shuffledTN = shuffleArray(rawTN).map(item => shuffleOptionsInMCQ(item));

            // 2. Đúng/sai: flatten thành từng ý, rồi xáo các ý
            const rawDS = originalData.dung_sai || [];
            const flatDS = flattenDungSaiBlocks(rawDS);
            const shuffledDS = shuffleArray(flatDS);

            // 3. Trộn lẫn trắc nghiệm và đúng sai với nhau (xen kẽ)
            let combined = [...shuffledTN, ...shuffledDS];
            combined = shuffleArray(combined);  // xáo trộn cả 2 loại

            return combined;
        }

        // Khởi tạo bài thi mới (xáo đề, reset biến)
        function startNewExam() {
            if (!originalData) {
                alert('Chưa tải xong dữ liệu, thử lại');
                return;
            }
            shuffledQuestions = buildShuffledExam();
            currentIndex = 0;
            userAnswers = new Array(shuffledQuestions.length).fill(null); // null = chưa trả lời

            // ẩn / hiện màn hình
            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            examScreen.classList.remove('hidden');

            // cập nhật màn hình đầu tiên
            renderCurrentQuestion();
            updateProgress();
            nextBtn.disabled = true;      // chưa chọn đáp án
        }

        // Hiển thị câu hiện tại (currentIndex)
        function renderCurrentQuestion() {
            if (!shuffledQuestions.length || currentIndex >= shuffledQuestions.length) {
                // nếu không may (lỗi) về màn hình kết thúc
                finishExam();
                return;
            }
            const q = shuffledQuestions[currentIndex];
            const userAns = userAnswers[currentIndex]; // { selected } hoặc null

            let html = '';
            if (q.loai === 'tracnghiem') {
                // câu trắc nghiệm
                html += `<div class="question-text">❓ ${q.cau_hoi}</div>`;
                html += `<div class="options-grid" id="optionsContainer">`;
                q.dap_an.forEach((opt, idx) => {
                    const prefix = String.fromCharCode(65 + idx); // A,B,C,D
                    let extraClass = '';
                    // nếu đã trả lời câu này rồi, hiển thị màu đúng/sai
                    if (userAns) {
                        const selectedIdx = userAns.selectedIdx;
                        if (idx === q.dap_an_dung) extraClass = ' correct-opt';      // đáp án đúng
                        else if (idx === selectedIdx && selectedIdx !== q.dap_an_dung) extraClass = ' wrong-opt'; // chọn sai
                        else if (idx === selectedIdx) extraClass = ' selected-opt';   // chọn đúng (bản thân nó sẽ overlap với correct-opt, nhưng correct-opt ghi đè)
                    }
                    html += `<div class="option-item${extraClass}" data-opt-index="${idx}">`;
                    html += `<div class="option-marker">${prefix}</div>`;
                    html += `<div class="option-text">${opt}</div>`;
                    // nếu đã trả lời và đây là đáp án đúng, thêm nhãn
                    if (userAns && idx === q.dap_an_dung) {
                        html += `<span style="margin-left:auto; background:#1f8b4c; color:white; padding:4px 15px; border-radius:40px; font-weight:500;">✓ Đáp án đúng</span>`;
                    }
                    html += `</div>`;
                });
                html += `</div>`;
            } else {
                // câu đúng/sai
                html += `<div class="passage-box">📜 ${q.doan_tu_lieu}</div>`;
                html += `<div class="question-text">📌 ${q.noi_dung}</div>`;
                html += `<div class="options-grid" id="optionsContainer">`;
                // tạo 2 lựa chọn: Đúng / Sai
                [true, false].forEach((val, idx) => {
                    const label = val ? 'Đúng' : 'Sai';
                    let extraClass = '';
                    if (userAns) {
                        const selectedVal = userAns.selectedBool; // boolean
                        if (val === q.dap_an_dung) extraClass = ' correct-opt';
                        else if (val === selectedVal && selectedVal !== q.dap_an_dung) extraClass = ' wrong-opt';
                        else if (val === selectedVal) extraClass = ' selected-opt';
                    }
                    html += `<div class="option-item${extraClass}" data-opt-bool="${val}">`;
                    html += `<div class="option-marker">${idx === 0 ? 'A' : 'B'}</div>`;
                    html += `<div class="option-text">${label}</div>`;
                    if (userAns && val === q.dap_an_dung) {
                        html += `<span style="margin-left:auto; background:#1f8b4c; color:white; padding:4px 15px; border-radius:40px;">✓ Đáp án đúng</span>`;
                    }
                    html += `</div>`;
                });
                html += `</div>`;
            }

            // Nếu đã trả lời câu này, hiển thị feedback
            if (userAns) {
                const isCorrect = (q.loai === 'tracnghiem') ? (userAns.selectedIdx === q.dap_an_dung) : (userAns.selectedBool === q.dap_an_dung);
                const fbClass = isCorrect ? 'correct-badge' : 'wrong-badge';
                const fbText = isCorrect ? '✅ Chính xác!' : '❌ Sai rồi!';
                html += `<div class="feedback-box"><span class="${fbClass}">${fbText}</span></div>`;
            }

            questionPanel.innerHTML = html;

            // Gắn sự kiện click cho các option (nếu chưa trả lời)
            if (!userAns) {
                document.querySelectorAll('.option-item').forEach(opt => {
                    opt.addEventListener('click', (e) => {
                        const target = e.currentTarget;
                        // tránh chọn lại sau khi đã trả lời
                        if (userAnswers[currentIndex] !== null) return;

                        let selectedValue;
                        let isCorrect;
                        const q = shuffledQuestions[currentIndex];

                        if (q.loai === 'tracnghiem') {
                            const selectedIdx = parseInt(target.dataset.optIndex, 10);
                            selectedValue = selectedIdx;
                            isCorrect = (selectedIdx === q.dap_an_dung);
                            userAnswers[currentIndex] = { selectedIdx, isCorrect };
                        } else {
                            const selectedBool = target.dataset.optBool === 'true'; // chuỗi 'true' -> boolean true
                            selectedValue = selectedBool;
                            isCorrect = (selectedBool === q.dap_an_dung);
                            userAnswers[currentIndex] = { selectedBool, isCorrect };
                        }

                        // render lại câu để hiện màu và feedback
                        renderCurrentQuestion();
                        updateProgress();
                        nextBtn.disabled = false;   // cho phép next
                    });
                });
            } else {
                // đã trả lời: không cho click lại
            }

            // Cập nhật nút next (nếu đã trả lời thì enabled, nếu chưa thì disabled)
            nextBtn.disabled = (userAnswers[currentIndex] === null);
        }

        // Cập nhật số câu, điểm
        function updateProgress() {
            const total = shuffledQuestions.length;
            currentQSpan.innerText = currentIndex + 1;
            totalQSpan.innerText = total;

            // Tính số câu đúng/sai trong userAnswers
            let correct = 0, wrong = 0;
            userAnswers.forEach(ans => {
                if (ans !== null) {
                    ans.isCorrect ? correct++ : wrong++;
                }
            });
            correctSpan.innerText = correct;
            wrongSpan.innerText = wrong;
        }

        // Kết thúc, hiển thị kết quả
        function finishExam() {
            examScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            const total = shuffledQuestions.length;
            let correct = 0, wrong = 0;
            userAnswers.forEach(ans => {
                if (ans !== null) {
                    ans.isCorrect ? correct++ : wrong++;
                }
            });
            bigScore.innerText = `${correct}/${total}`;
            correctCountResult.innerText = correct;
            wrongCountResult.innerText = wrong;
        }

        // Xử lý nút tiếp theo
        function goToNext() {
            if (userAnswers[currentIndex] === null) return; // chưa chọn

            if (currentIndex < shuffledQuestions.length - 1) {
                currentIndex++;
                renderCurrentQuestion();
                updateProgress();
                nextBtn.disabled = (userAnswers[currentIndex] === null);
            } else {
                // hết câu, kết thúc
                finishExam();
            }
        }

        // Làm lại (từ màn hình exam) -> quay lại start
        function restartFromExam() {
            startScreen.classList.remove('hidden');
            examScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
        }

        // ----- Load file de.json -----
        async function loadData() {
            try {
                const response = await fetch('de.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const json = await response.json();
                originalData = json;
                // Cho phép bắt đầu
                startBtn.disabled = false;
                startBtn.innerText = 'BẮT ĐẦU';
            } catch (err) {
                console.error(err);
                startScreen.innerHTML += `<div style="color:red; margin-top:25px;">❌ Lỗi tải de.json: ${err.message}. Hãy đảm bảo file tồn tại.</div>`;
            }
        }

        // Gắn sự kiện
        startBtn.addEventListener('click', () => {
            if (!originalData) {
                alert('Dữ liệu chưa sẵn sàng, vui lòng đợi');
                return;
            }
            startNewExam();
        });

        nextBtn.addEventListener('click', goToNext);

        restartBtn.addEventListener('click', restartFromExam);

        newExamBtn.addEventListener('click', () => {
            startNewExam();   // xáo lại đề
        });

        // Khởi tạo: load data
        loadData();

        // ẩn nút next cho tới khi chọn
    })();
</script>
</body>
</html>
