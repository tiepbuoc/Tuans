<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thi thử lịch sử (xáo đề ngẫu nhiên)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: #eef2f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .exam-container {
            max-width: 950px;
            width: 100%;
            background: white;
            border-radius: 40px;
            box-shadow: 0 30px 50px rgba(0, 20, 40, 0.2);
            padding: 30px 35px;
            transition: 0.2s;
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #0a2647;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #cfdef5;
            padding-bottom: 18px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .badge {
            background: #1e3a5f;
            color: white;
            padding: 8px 22px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .progress-area {
            background: #f0f4fc;
            border-radius: 60px;
            padding: 12px 24px;
            margin: 10px 0 25px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .q-counter {
            font-weight: 600;
            color: #0a2647;
            background: white;
            padding: 5px 20px;
            border-radius: 40px;
            font-size: 1.1rem;
        }
        .score {
            font-size: 1.1rem;
            background: #2e5a3a;
            color: white;
            padding: 5px 22px;
            border-radius: 40px;
        }
        .question-panel {
            background: #ffffff;
            border-radius: 32px;
            padding: 20px 25px 30px 25px;
            box-shadow: inset 0 0 0 1px #e2eaf6, 0 8px 20px rgba(0,0,0,0.02);
            margin: 15px 0 10px;
        }
        .q-text {
            font-size: 1.4rem;
            font-weight: 550;
            line-height: 1.5;
            color: #0b1c33;
            margin: 10px 0 25px 10px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 25px 0 15px;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 14px 22px;
            background: #f9fbfe;
            border: 2px solid #dbe2ed;
            border-radius: 60px;
            font-size: 1.12rem;
            cursor: pointer;
            transition: 0.1s;
            font-weight: 500;
        }
        .option-item:hover:not(.disabled-opt) {
            background: #e2ecff;
            border-color: #7f9bc2;
        }
        .option-prefix {
            font-weight: 800;
            background: #cbd6e8;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #0f2742;
            flex-shrink: 0;
            font-size: 1.1rem;
        }
        .selected-opt {
            background: #d3e2ff;
            border-color: #1e3a5f;
        }
        .correct-opt {
            background: #c5f0d0;
            border-color: #1e8252;
        }
        .wrong-opt {
            background: #ffdede;
            border-color: #ba4b4b;
        }
        .feedback-area {
            margin: 25px 0 15px;
            padding: 18px 20px;
            border-radius: 28px;
            font-size: 1.15rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .correct-feedback {
            background: #e1f7e8;
            color: #11643c;
            border-left: 8px solid #1f9b56;
        }
        .wrong-feedback {
            background: #ffe9e9;
            color: #a52a2a;
            border-left: 8px solid #c73b3b;
        }
        .btn-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        button {
            background: white;
            border: 2px solid #1e3a5f;
            color: #1e3a5f;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 12px 32px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            min-width: 150px;
        }
        button.primary {
            background: #1e3a5f;
            color: white;
            border: 2px solid #1e3a5f;
        }
        button.primary:hover {
            background: #0f2a46;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .start-screen, .result-screen {
            text-align: center;
            padding: 40px 20px;
        }
        .big-icon {
            font-size: 4.5rem;
            margin-bottom: 15px;
        }
        .summary-card {
            background: #f0f6ff;
            border-radius: 40px;
            padding: 40px;
            margin-top: 20px;
        }
        .result-row {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin: 30px 0;
        }
        .result-box {
            background: white;
            padding: 30px 40px;
            border-radius: 40px;
            min-width: 180px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
        }
        .result-number {
            font-size: 4rem;
            font-weight: 700;
        }
        .correct-number { color: #1e8252; }
        .wrong-number { color: #b13e3e; }
        .reset-btn {
            background: #1e3a5f;
            color: white;
            border: none;
            font-size: 1.3rem;
            padding: 15px 50px;
            margin-top: 20px;
        }
        .hidden {
            display: none !important;
        }
        .mt-3 { margin-top: 20px; }
        .italic { font-style: italic; color: #3f5470; }
        .small-note { font-size: 0.95rem; color: #4d627c; margin-left: 15px; }
    </style>
</head>
<body>
<div class="exam-container" id="examContainer">
    <h1>Đề cương lịch sử <span class="badge" id="examMode">....</span></h1>

    <!-- Màn hình bắt đầu -->
    <div id="startScreen" class="start-screen">
        <div class="big-icon">📚</div>
        <h2>Đề cương lịch sử</h2>
        <button id="startBtn" class="primary" style="font-size: 1.5rem; padding: 18px 60px;">BẮT ĐẦU</button>
    </div>

    <!-- Màn hình làm bài (ẩn ban đầu) -->
    <div id="examScreen" class="hidden">
        <div class="progress-area">
            <span class="q-counter" id="questionCounter">Câu 0/0</span>
            <span class="score" id="scoreDisplay">✅ 0 đúng | ❌ 0 sai</span>
        </div>

        <!-- Khu vực hiển thị câu hỏi (biến động theo loại) -->
        <div id="questionPanel" class="question-panel">
            <!-- sẽ được fill bằng js -->
        </div>

        <div class="btn-group">
            <button id="nextBtn" class="primary" disabled>⏩ Câu tiếp</button>
            <button id="restartBtn">↻ Làm lại</button>
        </div>
    </div>

    <!-- Màn hình kết quả (ẩn) -->
    <div id="resultScreen" class="hidden">
        <div class="summary-card">
            <div class="big-icon">🏁</div>
            <h2>Hoàn thành bài thi</h2>
            <div class="result-row">
                <div class="result-box">
                    <div class="result-number correct-number" id="correctCountResult">0</div>
                    <div>Câu đúng</div>
                </div>
                <div class="result-box">
                    <div class="result-number wrong-number" id="wrongCountResult">0</div>
                    <div>Câu sai</div>
                </div>
            </div>
            <div style="font-size: 1.2rem; margin: 10px 0;">Tổng số câu: <span id="totalQuestionsResult">0</span></div>
            <button id="newExamBtn" class="reset-btn">🔄 Thi lại (xáo đề mới)</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- Dữ liệu gốc (sẽ load từ de.json) ----------
        let originalData = null;
        // Các mảng đã xáo cho bài thi hiện tại
        let shuffledQuestions = [];        // mảng các item: loại, nội dung, đáp án, v.v.
        let currentIndex = 0;              // index câu hiện tại
        let userAnswers = [];               // lưu câu trả lời của user: { selectedIdx, isCorrect, ... }
        let examInProgress = false;

        // DOM elements
        const startScreen = document.getElementById('startScreen');
        const examScreen = document.getElementById('examScreen');
        const resultScreen = document.getElementById('resultScreen');
        const questionPanel = document.getElementById('questionPanel');
        const questionCounter = document.getElementById('questionCounter');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const nextBtn = document.getElementById('nextBtn');
        const restartBtn = document.getElementById('restartBtn');
        const startBtn = document.getElementById('startBtn');
        const newExamBtn = document.getElementById('newExamBtn');
        const correctCountResult = document.getElementById('correctCountResult');
        const wrongCountResult = document.getElementById('wrongCountResult');
        const totalQuestionsResult = document.getElementById('totalQuestionsResult');

        // ----- Hàm xáo trộn mảng (Fisher–Yates) -----
        function shuffleArray(arr) {
            if (!arr || !Array.isArray(arr)) return arr;
            const copy = [...arr];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        // Xáo đáp án trong câu trắc nghiệm (trả về item mới với dap_an và dap_an_dung đã điều chỉnh)
        function shuffleOptionsInMCQ(item) {
            const options = item.dap_an.map((text, idx) => ({ text, origIdx: idx }));
            const shuffledOpts = shuffleArray(options);
            const newOptionsText = shuffledOpts.map(o => o.text);
            // tìm vị trí mới của đáp án đúng (dựa vào origIdx)
            const correctOrig = item.dap_an_dung; // 0,1,2,3
            let newCorrectIndex = shuffledOpts.findIndex(o => o.origIdx === correctOrig);
            return {
                cau_hoi: item.cau_hoi,
                dap_an: newOptionsText,
                dap_an_dung: newCorrectIndex,
                loai: 'tracnghiem'
            };
        }

        // Chuyển câu đúng/sai thành dạng thống nhất (mỗi ý là một câu riêng)
        function flattenDungSaiBlocks(dsArray) {
            const flat = [];
            if (!dsArray) return flat;
            dsArray.forEach((block, blockIdx) => {
                const doan = block.doan_tu_lieu || '';
                const cauHoiList = block.cau_hoi || [];
                cauHoiList.forEach((item, idx) => {
                    flat.push({
                        loai: 'dungsai',
                        doan_tu_lieu: doan,
                        noi_dung: item.noi_dung,
                        dap_an_dung: item.dap_an, // boolean true/false
                        originalBlockIdx: blockIdx,
                        originalItemIdx: idx
                    });
                });
            });
            return flat;
        }

        // ----- Tạo đề thi xáo trộn hoàn chỉnh từ originalData -----
        function buildShuffledExam() {
            if (!originalData) return [];

            // 1. Trắc nghiệm: xáo câu, và trong mỗi câu xáo đáp án
            const rawTN = originalData.trac_nghiem || [];
            const shuffledTN = shuffleArray(rawTN).map(item => shuffleOptionsInMCQ(item));

            // 2. Đúng/sai: flatten thành từng ý, rồi xáo các ý
            const rawDS = originalData.dung_sai || [];
            const flatDS = flattenDungSaiBlocks(rawDS);
            const shuffledDS = shuffleArray(flatDS);

            // 3. Trộn lẫn trắc nghiệm và đúng sai với nhau (xen kẽ)
            let combined = [...shuffledTN, ...shuffledDS];
            combined = shuffleArray(combined);  // xáo trộn cả 2 loại

            return combined;
        }

        // Khởi tạo bài thi mới (xáo đề, reset biến)
        function startNewExam() {
            if (!originalData) {
                alert('Chưa tải xong dữ liệu, thử lại');
                return;
            }
            shuffledQuestions = buildShuffledExam();
            currentIndex = 0;
            userAnswers = new Array(shuffledQuestions.length).fill(null); // null = chưa trả lời

            // ẩn / hiện màn hình
            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            examScreen.classList.remove('hidden');

            // cập nhật màn hình đầu tiên
            renderCurrentQuestion();
            updateProgress();
            nextBtn.disabled = true;      // chưa chọn đáp án
        }

        // Hiển thị câu hiện tại (currentIndex)
        function renderCurrentQuestion() {
            if (!shuffledQuestions.length || currentIndex >= shuffledQuestions.length) {
                // nếu không may (lỗi) về màn hình kết thúc
                finishExam();
                return;
            }
            const q = shuffledQuestions[currentIndex];
            const userAns = userAnswers[currentIndex]; // { selected } hoặc null

            let html = '';
            if (q.loai === 'tracnghiem') {
                // câu trắc nghiệm
                html += `<div class="q-text">❓ ${q.cau_hoi}</div>`;
                html += `<div class="options" id="optionsContainer">`;
                q.dap_an.forEach((opt, idx) => {
                    const prefix = String.fromCharCode(65 + idx); // A,B,C,D
                    let extraClass = '';
                    // nếu đã trả lời câu này rồi, hiển thị màu đúng/sai
                    if (userAns) {
                        const selectedIdx = userAns.selectedIdx;
                        if (idx === q.dap_an_dung) extraClass = ' correct-opt';      // đáp án đúng
                        else if (idx === selectedIdx && selectedIdx !== q.dap_an_dung) extraClass = ' wrong-opt'; // chọn sai
                        else if (idx === selectedIdx) extraClass = ' selected-opt';   // chọn đúng (bản thân nó sẽ overlap với correct-opt, nhưng correct-opt ghi đè)
                    }
                    html += `<div class="option-item${extraClass}" data-opt-index="${idx}">`;
                    html += `<span class="option-prefix">${prefix}</span>`;
                    html += `<span>${opt}</span>`;
                    // nếu đã trả lời và đây là đáp án đúng, thêm nhãn
                    if (userAns && idx === q.dap_an_dung) {
                        html += `<span style="margin-left:auto; background:#1f8b4c; color:white; padding:4px 15px; border-radius:40px; font-weight:500;">✓</span>`;
                    }
                    html += `</div>`;
                });
                html += `</div>`;
            } else {
                // câu đúng/sai
                html += `<div class="doan-tu-lieu" style="background:#fbf4e5; padding:15px 20px; border-radius:30px; border-left:6px solid #b1682c; margin-bottom:20px;">📜 ${q.doan_tu_lieu}</div>`;
                html += `<div class="q-text">📌 ${q.noi_dung}</div>`;
                html += `<div class="options" id="optionsContainer">`;
                // tạo 2 lựa chọn: Đúng / Sai
                [true, false].forEach((val, idx) => {
                    const label = val ? 'Đúng' : 'Sai';
                    let extraClass = '';
                    if (userAns) {
                        const selectedVal = userAns.selectedBool; // boolean
                        if (val === q.dap_an_dung) extraClass = ' correct-opt';
                        else if (val === selectedVal && selectedVal !== q.dap_an_dung) extraClass = ' wrong-opt';
                        else if (val === selectedVal) extraClass = ' selected-opt';
                    }
                    html += `<div class="option-item${extraClass}" data-opt-bool="${val}">`;
                    html += `<span class="option-prefix">${idx === 0 ? 'A' : 'B'}</span>`;
                    html += `<span>${label}</span>`;
                    if (userAns && val === q.dap_an_dung) {
                        html += `<span style="margin-left:auto; background:#1f8b4c; color:white; padding:4px 15px; border-radius:40px;">✓ Đáp án đúng</span>`;
                    }
                    html += `</div>`;
                });
                html += `</div>`;
            }

            // Nếu đã trả lời câu này, hiển thị feedback
            if (userAns) {
                const isCorrect = (q.loai === 'tracnghiem') ? (userAns.selectedIdx === q.dap_an_dung) : (userAns.selectedBool === q.dap_an_dung);
                const fbClass = isCorrect ? 'correct-feedback' : 'wrong-feedback';
                const fbText = isCorrect ? '✅ Chính xác!' : '❌ Sai rồi!';
                html += `<div class="feedback-area ${fbClass}">${fbText}</div>`;
            }

            questionPanel.innerHTML = html;

            // Gắn sự kiện click cho các option (nếu chưa trả lời)
            if (!userAns) {
                document.querySelectorAll('.option-item').forEach(opt => {
                    opt.addEventListener('click', (e) => {
                        const target = e.currentTarget;
                        // tránh chọn lại sau khi đã trả lời
                        if (userAnswers[currentIndex] !== null) return;

                        let selectedValue;
                        let isCorrect;
                        const q = shuffledQuestions[currentIndex];

                        if (q.loai === 'tracnghiem') {
                            const selectedIdx = parseInt(target.dataset.optIndex, 10);
                            selectedValue = selectedIdx;
                            isCorrect = (selectedIdx === q.dap_an_dung);
                            userAnswers[currentIndex] = { selectedIdx, isCorrect };
                        } else {
                            const selectedBool = target.dataset.optBool === 'true'; // chuỗi 'true' -> boolean true
                            selectedValue = selectedBool;
                            isCorrect = (selectedBool === q.dap_an_dung);
                            userAnswers[currentIndex] = { selectedBool, isCorrect };
                        }

                        // render lại câu để hiện màu và feedback
                        renderCurrentQuestion();
                        updateProgress();
                        nextBtn.disabled = false;   // cho phép next
                    });
                });
            } else {
                // đã trả lời: không cho click lại
            }

            // Cập nhật nút next (nếu đã trả lời thì enabled, nếu chưa thì disabled)
            nextBtn.disabled = (userAnswers[currentIndex] === null);
        }

        // Cập nhật số câu, điểm
        function updateProgress() {
            const total = shuffledQuestions.length;
            questionCounter.innerText = `Câu ${currentIndex+1} / ${total}`;

            // Tính số câu đúng/sai trong userAnswers
            let correct = 0, wrong = 0;
            userAnswers.forEach(ans => {
                if (ans !== null) {
                    ans.isCorrect ? correct++ : wrong++;
                }
            });
            scoreDisplay.innerText = `✅ ${correct} đúng  |  ❌ ${wrong} sai`;
        }

        // Kết thúc, hiển thị kết quả
        function finishExam() {
            examScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            const total = shuffledQuestions.length;
            let correct = 0, wrong = 0;
            userAnswers.forEach(ans => {
                if (ans !== null) {
                    ans.isCorrect ? correct++ : wrong++;
                }
            });
            correctCountResult.innerText = correct;
            wrongCountResult.innerText = wrong;
            totalQuestionsResult.innerText = total;
        }

        // Xử lý nút tiếp theo
        function goToNext() {
            if (userAnswers[currentIndex] === null) return; // chưa chọn

            if (currentIndex < shuffledQuestions.length - 1) {
                currentIndex++;
                renderCurrentQuestion();
                updateProgress();
                nextBtn.disabled = (userAnswers[currentIndex] === null);
            } else {
                // hết câu, kết thúc
                finishExam();
            }
        }

        // Làm lại (từ màn hình exam) -> quay lại start
        function restartFromExam() {
            startScreen.classList.remove('hidden');
            examScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
        }

        // ----- Load file de.json -----
        async function loadData() {
            try {
                const response = await fetch('de.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const json = await response.json();
                originalData = json;
                // Cho phép bắt đầu
                startBtn.disabled = false;
                startBtn.innerText = 'BẮT ĐẦU';
            } catch (err) {
                console.error(err);
                startScreen.innerHTML += `<div style="color:red; margin-top:25px;">❌ Lỗi tải de.json: ${err.message}. Hãy đảm bảo file tồn tại.</div>`;
            }
        }

        // Gắn sự kiện
        startBtn.addEventListener('click', () => {
            if (!originalData) {
                alert('Dữ liệu chưa sẵn sàng, vui lòng đợi');
                return;
            }
            startNewExam();
        });

        nextBtn.addEventListener('click', goToNext);

        restartBtn.addEventListener('click', restartFromExam);

        newExamBtn.addEventListener('click', () => {
            startNewExam();   // xáo lại đề
        });

        // Khởi tạo: load data
        loadData();

        // ẩn nút next cho tới khi chọn
    })();
</script>
</body>
</html>
