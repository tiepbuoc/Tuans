<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Đề cương lịch sử - Ôn tập thông minh</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #f5efe6 0%, #e8e0d3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .card {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 250, 240, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(100, 70, 40, 0.25), 0 10px 25px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(210, 180, 140, 0.3);
            overflow: hidden;
            padding: 24px 20px;
        }

        /* header */
        .header {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }

        .title-section {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .title-section h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #8b4513, #b85e2a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            text-align: center;
        }

        .progress-panel {
            background: #faf3e9;
            border-radius: 100px;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.03), 0 8px 12px -8px #b2956e;
            border: 1px solid #e2cfb5;
        }

        .q-counter {
            background: #efe2d2;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: #5e3a22;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .score-badge {
            background: #3a2618;
            padding: 8px 22px;
            border-radius: 40px;
            color: #f5e6d3;
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 6px 12px #3a261840;
        }

        /* main content */
        .question-container {
            background: #fffbf5;
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 24px 20px;
            margin: 20px 0 10px;
            border: 1px solid #f0e0ce;
            box-shadow: 0 10px 25px -10px #8b5a2e80;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 550;
            color: #3e2c1c;
            line-height: 1.5;
            margin-bottom: 25px;
            word-break: break-word;
            padding-left: 8px;
            border-left: 5px solid #b85e2a;
        }

        /* đoạn tư liệu */
        .passage-box {
            background: #faf0e1;
            border-radius: 28px;
            padding: 22px;
            margin-bottom: 28px;
            font-style: italic;
            border-left: 6px solid #b85e2a;
            color: #4a3723;
            font-size: 1rem;
            line-height: 1.6;
            box-shadow: inset 0 2px 5px #e5cfb5;
        }

        /* options */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 28px;
        }

        .option-item {
            background: #fffcf5;
            border: 2px solid #e0cfbc;
            border-radius: 60px;
            padding: 16px 22px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.12s;
            cursor: pointer;
            box-shadow: 0 4px 8px #e0cfbc;
        }

        .option-item:hover {
            border-color: #b85e2a;
            transform: scale(1.01);
            background: #ffefe1;
        }

        .option-item.selected {
            border-color: #8b4513;
            background: #ffe6d5;
            box-shadow: 0 10px 18px -10px #8b4513;
        }

        .option-marker {
            width: 36px;
            height: 36px;
            background: #ede0d2;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #5a3b22;
            border: 1px solid #cbaa88;
        }

        .option-item.selected .option-marker {
            background: #8b4513;
            color: white;
            border-color: white;
        }

        .option-text {
            font-size: 1.08rem;
            font-weight: 500;
            color: #3e2c1c;
            flex: 1;
        }

        /* feedback */
        .feedback-box {
            background: #fcf6ed;
            border-radius: 50px;
            padding: 22px 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-top: 28px;
            border: 1px solid #e2cfb5;
        }

        .correct-badge {
            background: #e0f0e0;
            color: #2a6230;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 600;
        }

        .wrong-badge {
            background: #ffe1e1;
            color: #aa1e1e;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 600;
        }

        /* buttons */
        .action-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin: 18px 0 10px;
        }

        .btn {
            background: white;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 1.5px solid #d6bc9c;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 6px 14px #e0cfbc;
            color: #4a3723;
        }

        .btn-primary {
            background: #8b4513;
            color: white;
            border: none;
            box-shadow: 0 16px 24px -8px #8b4513;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* summary */
        .summary-screen {
            background: #faf0e1;
            border-radius: 60px;
            padding: 40px 25px;
            text-align: center;
            margin-top: 20px;
        }

        .big-score {
            font-size: 3.5rem;
            font-weight: 800;
            background: white;
            display: inline-block;
            padding: 25px 55px;
            border-radius: 200px;
            margin: 25px 0;
            color: #8b4513;
            box-shadow: 0 20px 30px #b2956e;
        }

        .result-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .result-box {
            background: white;
            padding: 25px 35px;
            border-radius: 40px;
            min-width: 160px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .result-number {
            font-size: 3.5rem;
            font-weight: 700;
        }

        .correct-number {
            color: #2a6230;
        }

        .wrong-number {
            color: #b13e3e;
        }

        /* start screen */
        .start-screen, .result-screen {
            text-align: center;
            padding: 30px 20px;
        }

        .big-icon {
            font-size: 4.5rem;
            margin-bottom: 15px;
        }

        .hidden {
            display: none !important;
        }

        .readonly .option-item {
            pointer-events: none;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="card" id="app">
        <div class="header">
            <div class="title-section">
                <h1>Đề cương lịch sử</h1>
            </div>
            <div class="progress-panel hidden" id="progressPanel">
                <div class="q-counter" id="qCounter"><i class="fas fa-question-circle"></i> <span id="currentQ">0</span>/<span id="totalQ">0</span></div>
                <div class="score-badge" id="scoreDisplay"><i class="fas fa-check-circle"></i> <span id="correctCount">0</span> đúng · <span id="wrongCount">0</span> sai</div>
            </div>
        </div>

        <!-- Màn hình bắt đầu -->
        <div id="startScreen" class="start-screen">
            <div class="big-icon">📜</div>
            <h2 style="color:#5e3a22; margin-bottom:30px;">Đề cương lịch sử</h2>
            <button class="btn btn-primary" id="startBtn" style="font-size: 1.5rem; padding: 18px 60px;">BẮT ĐẦU</button>
        </div>

        <!-- Màn hình làm bài (ẩn ban đầu) -->
        <div id="examScreen" class="hidden">
            <div id="dynamicContent"></div>
            <div class="action-row">
                <button class="btn" id="restartBtn"><i class="fas fa-redo-alt"></i> Làm lại</button>
                <button class="btn btn-primary" id="nextBtn" disabled><i class="fas fa-arrow-right"></i> Câu tiếp</button>
            </div>
        </div>

        <!-- Màn hình kết quả (ẩn) -->
        <div id="resultScreen" class="hidden">
            <div class="summary-screen">
                <div class="big-icon">🏆</div>
                <h2 style="color:#5e3a22;">Hoàn thành đề cương</h2>
                <div class="result-row">
                    <div class="result-box">
                        <div class="result-number correct-number" id="correctCountResult">0</div>
                        <div style="font-size:1.2rem;">Đúng</div>
                    </div>
                    <div class="result-box">
                        <div class="result-number wrong-number" id="wrongCountResult">0</div>
                        <div style="font-size:1.2rem;">Sai</div>
                    </div>
                </div>
                <div style="font-size:1.3rem; margin:20px 0;">Tổng số: <span id="totalQuestionsResult">0</span> câu</div>
                <button class="btn btn-primary" id="newExamBtn" style="font-size:1.2rem; padding:16px 50px;"><i class="fas fa-redo-alt"></i> Thi lại (xáo đề mới)</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            let originalData = null;
            let shuffledQuestions = [];
            let currentIndex = 0;
            let userAnswers = [];

            // DOM elements
            const startScreen = document.getElementById('startScreen');
            const examScreen = document.getElementById('examScreen');
            const resultScreen = document.getElementById('resultScreen');
            const progressPanel = document.getElementById('progressPanel');
            const dynamicContent = document.getElementById('dynamicContent');
            const nextBtn = document.getElementById('nextBtn');
            const restartBtn = document.getElementById('restartBtn');
            const startBtn = document.getElementById('startBtn');
            const newExamBtn = document.getElementById('newExamBtn');

            // Progress elements
            const currentQSpan = document.getElementById('currentQ');
            const totalQSpan = document.getElementById('totalQ');
            const correctSpan = document.getElementById('correctCount');
            const wrongSpan = document.getElementById('wrongCount');
            const correctCountResult = document.getElementById('correctCountResult');
            const wrongCountResult = document.getElementById('wrongCountResult');
            const totalQuestionsResult = document.getElementById('totalQuestionsResult');

            // Hàm xáo trộn mảng
            function shuffleArray(arr) {
                const copy = [...arr];
                for (let i = copy.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [copy[i], copy[j]] = [copy[j], copy[i]];
                }
                return copy;
            }

            // Xáo đáp án trong câu trắc nghiệm
            function shuffleOptionsInMCQ(item) {
                const options = item.dap_an.map((text, idx) => ({ text, origIdx: idx }));
                const shuffledOpts = shuffleArray(options);
                const newOptionsText = shuffledOpts.map(o => o.text);
                const correctOrig = item.dap_an_dung;
                let newCorrectIndex = shuffledOpts.findIndex(o => o.origIdx === correctOrig);
                return {
                    loai: 'tracnghiem',
                    cau_hoi: item.cau_hoi,
                    dap_an: newOptionsText,
                    dap_an_dung: newCorrectIndex
                };
            }

            // Chuyển câu đúng/sai thành dạng thống nhất
            function flattenDungSaiBlocks(dsArray) {
                const flat = [];
                if (!dsArray) return flat;
                dsArray.forEach((block) => {
                    const doan = block.doan_tu_lieu || '';
                    const cauHoiList = block.cau_hoi || [];
                    cauHoiList.forEach((item) => {
                        flat.push({
                            loai: 'dungsai',
                            doan_tu_lieu: doan,
                            noi_dung: item.noi_dung,
                            dap_an_dung: item.dap_an // boolean
                        });
                    });
                });
                return flat;
            }

            // Tạo đề thi xáo trộn
            function buildShuffledExam() {
                if (!originalData) return [];

                const rawTN = originalData.trac_nghiem || [];
                const shuffledTN = shuffleArray(rawTN).map(item => shuffleOptionsInMCQ(item));

                const rawDS = originalData.dung_sai || [];
                const flatDS = flattenDungSaiBlocks(rawDS);
                const shuffledDS = shuffleArray(flatDS);

                let combined = [...shuffledTN, ...shuffledDS];
                combined = shuffleArray(combined);
                return combined;
            }

            // Bắt đầu bài thi mới
            function startNewExam() {
                if (!originalData) {
                    alert('Chưa tải xong dữ liệu!');
                    return;
                }
                shuffledQuestions = buildShuffledExam();
                currentIndex = 0;
                userAnswers = new Array(shuffledQuestions.length).fill(null);

                startScreen.classList.add('hidden');
                resultScreen.classList.add('hidden');
                examScreen.classList.remove('hidden');
                progressPanel.classList.remove('hidden');

                renderCurrentQuestion();
                updateProgress();
                nextBtn.disabled = true;
            }

            // Cập nhật progress
            function updateProgress() {
                const total = shuffledQuestions.length;
                currentQSpan.innerText = currentIndex + 1;
                totalQSpan.innerText = total;

                let correct = 0, wrong = 0;
                userAnswers.forEach(ans => {
                    if (ans !== null) {
                        ans.isCorrect ? correct++ : wrong++;
                    }
                });
                correctSpan.innerText = correct;
                wrongSpan.innerText = wrong;
            }

            // Kiểm tra đáp án
            function checkAnswer(q, selectedValue) {
                if (q.loai === 'tracnghiem') {
                    return parseInt(selectedValue) === q.dap_an_dung;
                } else {
                    return selectedValue === q.dap_an_dung;
                }
            }

            // Xử lý submit câu trả lời
            function handleSubmit(selectedValue) {
                const q = shuffledQuestions[currentIndex];
                if (!q) return;
                if (document.getElementById('feedbackBox')) return; // đã nộp

                const isCorrect = checkAnswer(q, selectedValue);
                let correctAnswer = '';
                if (q.loai === 'tracnghiem') {
                    correctAnswer = q.dap_an[q.dap_an_dung];
                } else {
                    correctAnswer = q.dap_an_dung ? 'Đúng' : 'Sai';
                }

                userAnswers[currentIndex] = {
                    selected: selectedValue,
                    isCorrect: isCorrect,
                    correctAnswer: correctAnswer
                };

                updateProgress();
                showFeedback(isCorrect, correctAnswer);
            }

            // Hiển thị feedback
            function showFeedback(isCorrect, correctAnswer) {
                const actionDiv = document.getElementById('actionArea');
                if (!actionDiv) return;

                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'feedback-box';
                feedbackDiv.id = 'feedbackBox';

                const msgSpan = document.createElement('span');
                msgSpan.className = isCorrect ? 'correct-badge' : 'wrong-badge';
                msgSpan.innerHTML = isCorrect ? 
                    '<i class="fas fa-check-circle"></i> Chính xác!' : 
                    `<i class="fas fa-times-circle"></i> Đáp án: ${correctAnswer}`;

                feedbackDiv.appendChild(msgSpan);
                actionDiv.innerHTML = '';
                actionDiv.appendChild(feedbackDiv);

                document.querySelector('.question-container')?.classList.add('readonly');
                nextBtn.disabled = false;
            }

            // Render câu hiện tại
            function renderCurrentQuestion() {
                if (!shuffledQuestions.length || currentIndex >= shuffledQuestions.length) {
                    finishExam();
                    return;
                }

                const q = shuffledQuestions[currentIndex];
                const userAns = userAnswers[currentIndex];

                let html = `<div class="question-container" id="questionContainer">`;
                html += `<div class="question-text">${q.loai === 'tracnghiem' ? '❓ ' + q.cau_hoi : '📌 ' + q.noi_dung}</div>`;

                if (q.loai === 'dungsai' && q.doan_tu_lieu) {
                    html += `<div class="passage-box"><i class="fas fa-scroll" style="margin-right:10px;"></i>${q.doan_tu_lieu}</div>`;
                }

                if (q.loai === 'tracnghiem') {
                    html += `<div class="options-grid" id="optionsContainer">`;
                    const letters = ['A', 'B', 'C', 'D'];
                    q.dap_an.forEach((opt, idx) => {
                        let selectedClass = '';
                        if (userAns && parseInt(userAns.selected) === idx) {
                            selectedClass = ' selected';
                        }
                        html += `
                            <div class="option-item${selectedClass}" data-opt-index="${idx}">
                                <div class="option-marker">${letters[idx]}</div>
                                <div class="option-text">${opt}</div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                } else {
                    html += `<div class="options-grid" id="optionsContainer">`;
                    [true, false].forEach((val, idx) => {
                        const label = val ? 'Đúng' : 'Sai';
                        let selectedClass = '';
                        if (userAns && userAns.selected === val) {
                            selectedClass = ' selected';
                        }
                        html += `
                            <div class="option-item${selectedClass}" data-opt-bool="${val}">
                                <div class="option-marker">${idx === 0 ? 'A' : 'B'}</div>
                                <div class="option-text">${label}</div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }

                html += `<div id="actionArea"></div>`;
                html += `</div>`;

                dynamicContent.innerHTML = html;

                // Gắn sự kiện nếu chưa trả lời
                if (!userAns) {
                    document.querySelectorAll('.option-item').forEach(opt => {
                        opt.addEventListener('click', () => {
                            if (userAnswers[currentIndex] !== null) return;
                            
                            document.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
                            opt.classList.add('selected');
                            
                            let selectedValue;
                            if (q.loai === 'tracnghiem') {
                                selectedValue = opt.dataset.optIndex;
                            } else {
                                selectedValue = opt.dataset.optBool === 'true';
                            }
                            handleSubmit(selectedValue);
                        });
                    });
                } else {
                    document.querySelector('.question-container')?.classList.add('readonly');
                }
            }

            // Kết thúc thi
            function finishExam() {
                examScreen.classList.add('hidden');
                progressPanel.classList.add('hidden');
                resultScreen.classList.remove('hidden');

                const total = shuffledQuestions.length;
                let correct = 0, wrong = 0;
                userAnswers.forEach(ans => {
                    if (ans !== null) {
                        ans.isCorrect ? correct++ : wrong++;
                    }
                });
                correctCountResult.innerText = correct;
                wrongCountResult.innerText = wrong;
                totalQuestionsResult.innerText = total;
            }

            // Chuyển câu tiếp
            function goToNext() {
                if (userAnswers[currentIndex] === null) return;

                if (currentIndex < shuffledQuestions.length - 1) {
                    currentIndex++;
                    renderCurrentQuestion();
                    updateProgress();
                    nextBtn.disabled = true;
                } else {
                    finishExam();
                }
            }

            // Làm lại từ đầu
            function restartExam() {
                startScreen.classList.remove('hidden');
                examScreen.classList.add('hidden');
                resultScreen.classList.add('hidden');
                progressPanel.classList.add('hidden');
            }

            // Load dữ liệu
            async function loadData() {
                try {
                    const response = await fetch('de.json');
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const json = await response.json();
                    originalData = json;
                    startBtn.disabled = false;
                } catch (err) {
                    console.error(err);
                    startScreen.innerHTML += `<div style="color:red; margin-top:20px;">❌ Lỗi tải de.json: ${err.message}</div>`;
                }
            }

            // Event listeners
            startBtn.addEventListener('click', startNewExam);
            nextBtn.addEventListener('click', goToNext);
            restartBtn.addEventListener('click', restartExam);
            newExamBtn.addEventListener('click', () => {
                startNewExam();
            });

            // Khởi tạo
            loadData();
        })();
    </script>
</body>
</html>
