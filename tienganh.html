<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Đề cương tiếng anh</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #f0f5fa 0%, #e6ecf3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .card {
            max-width: 900px;
            width: 100%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(0, 20, 40, 0.2), 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255,255,255,0.5);
            overflow: hidden;
            padding: 24px 20px;
        }

        /* mobile first */
        .header {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }

        .title-section {
            display: flex;
            align-items: center;
            justify-content: center; /* căn giữa */
            width: 100%;
        }

        .title-section h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0b3954, #1f5e8e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            text-align: center;
        }

        .progress-panel {
            background: white;
            border-radius: 100px;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.03), 0 8px 12px -8px #a0bace;
            border: 1px solid #deecfb;
        }

        .q-counter {
            background: #eef3fc;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: #11517c;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .score-badge {
            background: #0e2c41;
            padding: 8px 22px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 6px 12px #0e2c4130;
        }

        /* main content */
        .question-container {
            background: #ffffffd9;
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 24px 20px;
            margin: 20px 0 10px;
            border: 1px solid #ffffff;
            box-shadow: 0 10px 25px -10px #1f4e7a30;
        }

        .question-text {
            font-size: 1.18rem;
            font-weight: 550;
            color: #0f2f45;
            line-height: 1.45;
            margin-bottom: 28px;
            word-break: break-word;
        }

        /* passage / cloze */
        .passage-box {
            background: #eaf3fe;
            border-radius: 28px;
            padding: 22px;
            margin-bottom: 28px;
            font-style: italic;
            border-left: 6px solid #2271b1;
            color: #183f60;
            font-size: 1rem;
            line-height: 1.6;
            box-shadow: inset 0 2px 5px #c9dbf0;
        }

        /* options */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 28px;
        }

        .option-item {
            background: white;
            border: 2px solid #dbe4f0;
            border-radius: 60px;
            padding: 16px 22px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.12s;
            cursor: pointer;
            box-shadow: 0 4px 8px #cddff0;
        }

        .option-item:hover {
            border-color: #3f8bcb;
            transform: scale(1.01);
            background: #f3faff;
        }

        .option-item.selected {
            border-color: #0369a1;
            background: #e2f0ff;
            box-shadow: 0 10px 18px -10px #0369a1;
        }

        .option-marker {
            width: 36px;
            height: 36px;
            background: #f0f7ff;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #175a88;
            border: 1px solid #b5d2f0;
        }

        .option-item.selected .option-marker {
            background: #0369a1;
            color: white;
            border-color: white;
        }

        .option-text {
            font-size: 1.08rem;
            font-weight: 500;
            color: #0c3f5e;
            flex: 1;
        }

        /* fill form */
        .fill-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 20px 0;
        }

        .original-word {
            background: #e2ecf9;
            border-radius: 60px;
            padding: 15px 25px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            font-weight: 500;
        }

        .original-word span {
            background: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-weight: 600;
            color: #022c44;
        }

        .fill-input {
            width: 100%;
            padding: 18px 25px;
            border: 2px solid #c9dcf2;
            border-radius: 60px;
            font-size: 1.05rem;
            background: white;
            transition: 0.15s;
        }

        .fill-input:focus {
            border-color: #0369a1;
            outline: none;
            box-shadow: 0 0 0 4px #9ec6f0;
        }

        /* error correction */
        .error-sentence {
            background: #f5faff;
            border-radius: 40px;
            padding: 28px 22px;
            font-size: 1.2rem;
            line-height: 2.4;
            margin: 20px 0;
            border: 2px solid #bed6f0;
        }

        .error-token {
            display: inline-block;
            background: white;
            border: 2px solid #7aa8d0;
            border-radius: 60px;
            padding: 8px 22px;
            margin: 0 5px;
            font-weight: 600;
            color: #0a3f64;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 4px 8px #bdd2ea;
        }

        .error-token.selected {
            background: #0369a1;
            border-color: #023b5c;
            color: white;
            box-shadow: 0 10px 18px -6px #0369a1;
        }

        /* rearrange */
        .rearrange-pool {
            background: #deecfb;
            border-radius: 40px;
            padding: 22px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 25px 0 20px;
            border: 2px dashed #538ec7;
        }

        .chunk {
            background: white;
            padding: 14px 26px;
            border-radius: 60px;
            font-weight: 550;
            border: 1px solid #8db6e0;
            box-shadow: 0 6px 12px #b3cef0;
            cursor: grab;
            user-select: none;
            font-size: 1rem;
        }

        .dropzone {
            background: #ffffff;
            border-radius: 40px;
            padding: 22px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            min-height: 100px;
            border: 3px solid #5d9bd5;
            margin-bottom: 20px;
        }

        .action-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin: 18px 0 10px;
        }

        .btn {
            background: white;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 1.5px solid #c5d9f0;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 6px 14px #d4e2f5;
        }

        .btn-primary {
            background: #0369a1;
            color: white;
            border: none;
            box-shadow: 0 16px 24px -8px #0369a1;
        }

        .btn:active { transform: scale(0.97); }

        .feedback-box {
            background: #f6fbfe;
            border-radius: 50px;
            padding: 22px 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-top: 28px;
            border: 1px solid #c2dbf2;
        }

        .correct-badge {
            background: #e0f7e6;
            color: #0b6e31;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 600;
        }

        .wrong-badge {
            background: #ffe8e8;
            color: #aa1e1e;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 600;
        }

        /* summary */
        .summary-screen {
            background: #eaf3fe;
            border-radius: 60px;
            padding: 40px 25px;
            text-align: center;
        }

        .big-score {
            font-size: 3.5rem;
            font-weight: 800;
            background: white;
            display: inline-block;
            padding: 25px 55px;
            border-radius: 200px;
            margin: 25px 0;
            color: #11517c;
            box-shadow: 0 20px 30px #9ebfe0;
        }

        /* responsive */
        @media (min-width: 700px) {
            .card { padding: 30px 35px; }
            .title-section h1 { font-size: 2.8rem; }
            .question-text { font-size: 1.28rem; }
        }

        /* disable interactions after submit */
        .readonly .option-item,
        .readonly .error-token,
        .readonly .chunk,
        .readonly .fill-input {
            pointer-events: none;
            opacity: 0.8;
        }

        .hidden { display: none; }
        .mt-2 { margin-top: 12px; }
        .mb-2 { margin-bottom: 12px; }
        .flex-right { display: flex; justify-content: flex-end; }
    </style>
</head>
<body>
    <div class="card" id="app">
        <div class="header">
            <div class="title-section">
                <h1>Đề cương tiếng anh</h1>
            </div>
            <div class="progress-panel">
                <div class="q-counter" id="qCounter"><i class="fas fa-question-circle"></i> <span id="currentQ">0</span>/<span id="totalQ">0</span></div>
                <div class="score-badge" id="scoreDisplay"><i class="fas fa-check-circle"></i> <span id="correctCount">0</span> đúng · <span id="wrongCount">0</span> sai</div>
            </div>
        </div>

        <!-- động -->
        <div id="dynamicContent"></div>
    </div>

    <script>
        (function() {
            let flatQuestions = [];
            let currentIndex = 0;
            let userAnswers = [];
            let correctCount = 0, wrongCount = 0;

            const dynamicDiv = document.getElementById('dynamicContent');
            const currentQSpan = document.getElementById('currentQ');
            const totalQSpan = document.getElementById('totalQ');
            const correctSpan = document.getElementById('correctCount');
            const wrongSpan = document.getElementById('wrongCount');

            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            function shuffleOptionsOfQuestion(q) {
                if (!q.options || !Array.isArray(q.options) || q.options.length === 0) return;
                const oldOpts = [...q.options];
                const correctVal = oldOpts[q.correct_option];
                const shuffled = shuffleArray([...oldOpts]);
                const newCorrectIdx = shuffled.indexOf(correctVal);
                q.options = shuffled;
                q.correct_option = newCorrectIdx;
            }

            async function loadAndPrepare() {
                try {
                    const resp = await fetch('de2.json');
                    if (!resp.ok) throw new Error('Không tìm thấy de2.json');
                    const data = await resp.json();
                    let rawExam = data.exam;

                    rawExam.parts = shuffleArray(rawExam.parts);

                    rawExam.parts.forEach(part => {
                        if (part.type === 'cloze_test') {} 
                        else if (part.questions) part.questions = shuffleArray([...part.questions]);
                    });

                    rawExam.parts.forEach(part => {
                        if (part.questions) {
                            part.questions.forEach(q => {
                                if (q.options && Array.isArray(q.options) && q.options.length > 0 && !q.is_rearrangement) {
                                    shuffleOptionsOfQuestion(q);
                                }
                            });
                        }
                    });

                    flatQuestions = [];
                    rawExam.parts.forEach(part => {
                        const partName = part.name || 'Ôn tập';
                        if (part.type === 'cloze_test' && part.questions) {
                            part.questions.forEach((q, idx) => {
                                flatQuestions.push({
                                    ...q,
                                    partName: partName,
                                    partType: 'cloze_test',
                                    passage: part.passage,
                                    clozeIndex: idx,
                                });
                            });
                        } else {
                            if (part.questions) {
                                part.questions.forEach(q => {
                                    flatQuestions.push({
                                        ...q,
                                        partName: partName,
                                        partType: part.type || 'unknown',
                                    });
                                });
                            }
                        }
                    });

                    userAnswers = new Array(flatQuestions.length).fill(null);
                    currentIndex = 0;
                    correctCount = 0; wrongCount = 0;
                    updateMeta();
                    renderCurrentQuestion();
                } catch (err) {
                    dynamicDiv.innerHTML = `<div style="color:red;padding:30px;"><i class="fas fa-exclamation-circle"></i> Lỗi tải: ${err.message}</div>`;
                }
            }

            function updateMeta() {
                currentQSpan.innerText = currentIndex + 1;
                totalQSpan.innerText = flatQuestions.length;
                correctSpan.innerText = correctCount;
                wrongSpan.innerText = wrongCount;
            }

            function checkAnswer(question, selectedValue) {
                if (question.error_word !== undefined) {
                    const norm = (s) => s.replace(/[\[\]]/g, '').trim().toLowerCase();
                    return norm(selectedValue) === norm(question.error_word);
                } else if (question.options) {
                    return parseInt(selectedValue) === question.correct_option;
                } else if (question.data?.original_word) {
                    return selectedValue.trim().toLowerCase() === (question.answer || '').trim().toLowerCase();
                } else if (question.answer) {
                    return selectedValue.trim().toLowerCase() === question.answer.trim().toLowerCase();
                }
                return false;
            }

            function handleSubmit(selectedRaw) {
                const q = flatQuestions[currentIndex];
                if (!q) return;
                if (document.getElementById('feedbackBox')) return; // đã nộp

                let isCorrect = false, correctAns = '';
                if (q.error_word !== undefined) {
                    isCorrect = checkAnswer(q, selectedRaw);
                    correctAns = q.correction || q.error_word;
                } else if (q.options) {
                    const idx = parseInt(selectedRaw);
                    isCorrect = idx === q.correct_option;
                    correctAns = q.options[q.correct_option] || '';
                } else {
                    correctAns = q.answer || '';
                    isCorrect = checkAnswer(q, selectedRaw);
                }

                userAnswers[currentIndex] = { selected: selectedRaw, isCorrect, correctAnswer: correctAns };
                if (isCorrect) correctCount++; else wrongCount++;
                updateMeta();
                showFeedback(isCorrect, correctAns);
            }

            function showFeedback(isCorrect, correctAns) {
                const actionDiv = document.getElementById('actionArea');
                if (!actionDiv) return;

                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'feedback-box';
                feedbackDiv.id = 'feedbackBox';

                const msgSpan = document.createElement('span');
                msgSpan.className = isCorrect ? 'correct-badge' : 'wrong-badge';
                msgSpan.innerHTML = isCorrect ? '<i class="fas fa-check-circle"></i> Chính xác!' : `<i class="fas fa-times-circle"></i> Đáp án: ${correctAns}`;

                const nextBtn = document.createElement('button');
                nextBtn.className = 'btn btn-primary';
                nextBtn.innerHTML = 'Tiếp <i class="fas fa-arrow-right"></i>';
                nextBtn.onclick = () => {
                    if (currentIndex < flatQuestions.length - 1) {
                        currentIndex++;
                        renderCurrentQuestion();
                    } else {
                        showSummary();
                    }
                };

                feedbackDiv.appendChild(msgSpan);
                feedbackDiv.appendChild(nextBtn);
                actionDiv.innerHTML = '';
                actionDiv.appendChild(feedbackDiv);

                // thêm class readonly để chặn thao tác
                document.querySelector('.question-container')?.classList.add('readonly');
            }

            function showSummary() {
                dynamicDiv.innerHTML = `
                    <div class="summary-screen">
                        <i class="fas fa-graduation-cap" style="font-size:3rem; color:#11517c;"></i>
                        <h2 style="margin:20px 0 10px;">Hoàn thành đề cương</h2>
                        <div class="big-score">${correctCount}/${flatQuestions.length}</div>
                        <div style="font-size:1.3rem; margin:10px 0 30px;">✅ Đúng: ${correctCount}  ❌ Sai: ${wrongCount}</div>
                        <button class="btn btn-primary" id="restartBtn"><i class="fas fa-redo-alt"></i> Làm lại (xáo mới)</button>
                    </div>
                `;
                document.getElementById('restartBtn').addEventListener('click', loadAndPrepare);
            }

            function renderCurrentQuestion() {
                if (!flatQuestions.length) return;
                if (currentIndex >= flatQuestions.length) return showSummary();

                const q = flatQuestions[currentIndex];
                let html = `<div class="question-container" id="questionContainer">`;
                html += `<div class="question-text">${q.question}</div>`;

                if (q.passage) html += `<div class="passage-box"><i class="fas fa-quote-left" style="margin-right:10px;"></i>${q.passage}</div>`;

                // error correction
                if (q.error_word !== undefined) {
                    let sentenceHtml = `<div class="error-sentence">`;
                    const parts = q.question.split(/(\[[^\]]+\])/g);
                    parts.forEach(part => {
                        if (part.startsWith('[') && part.endsWith(']')) {
                            const token = part.slice(1, -1);
                            sentenceHtml += `<span class="error-token" data-token="${token}">${part}</span>`;
                        } else sentenceHtml += part;
                    });
                    sentenceHtml += `</div>`;
                    html += sentenceHtml;
                    html += `<div id="actionArea"><button class="btn btn-primary" id="submitErrorBtn" disabled><i class="fas fa-paper-plane"></i> Trả lời</button></div>`;
                }
                // rearrangement
                else if (q.is_rearrangement) {
                    let chunkPart = q.question.replace(/^.*Rearrange[^:]*:\s*/i, '');
                    let rawChunks = chunkPart.split(' / ').map(s => s.trim()).filter(s => s.length);
                    if (!rawChunks.length) rawChunks = (q.answer || '').split(/\s+/);
                    const shuffled = shuffleArray([...rawChunks]);
                    html += `<div class="rearrange-pool" id="pool_${q.id}">`;
                    shuffled.forEach(ch => html += `<span class="chunk" draggable="true" data-chunk="${ch}">${ch}</span>`);
                    html += `</div>`;
                    html += `<div class="dropzone" id="drop_${q.id}"></div>`;
                    html += `<div class="action-row"><button class="btn" id="resetRearrangeBtn"><i class="fas fa-undo-alt"></i> Đặt lại</button>`;
                    html += `<button class="btn btn-primary" id="checkRearrangeBtn"><i class="fas fa-check"></i> Xác nhận</button></div>`;
                    html += `<div id="actionArea"></div>`;
                }
                // multiple choice (hoặc cloze mc)
                else if (q.options) {
                    html += `<div class="options-grid" id="optionsContainer">`;
                    const letters = ['A','B','C','D'];
                    q.options.forEach((opt, idx) => {
                        html += `
                            <div class="option-item" data-opt-index="${idx}">
                                <div class="option-marker">${letters[idx]}</div>
                                <div class="option-text">${opt}</div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                    html += `<div id="actionArea"></div>`;
                }
                // word form
                else if (q.data?.original_word) {
                    html += `<div class="fill-wrapper">`;
                    html += `<div class="original-word"><i class="fas fa-language"></i> Gốc: <span>${q.data.original_word}</span></div>`;
                    html += `<input type="text" class="fill-input" id="fillInput" placeholder="Nhập dạng đúng...">`;
                    html += `</div>`;
                    html += `<div id="actionArea"><button class="btn btn-primary" id="submitFillBtn"><i class="fas fa-paper-plane"></i> Trả lời</button></div>`;
                }
                // fallback fill
                else if (q.answer) {
                    html += `<input type="text" class="fill-input" id="simpleFillInput" placeholder="Đáp án...">`;
                    html += `<div id="actionArea" class="mt-2"><button class="btn btn-primary" id="submitSimpleBtn"><i class="fas fa-paper-plane"></i> Trả lời</button></div>`;
                }

                html += `</div>`; // close question-container
                dynamicDiv.innerHTML = html;

                // Gán sự kiện
                if (q.error_word !== undefined) {
                    let selectedToken = null;
                    document.querySelectorAll('.error-token').forEach(t => {
                        t.addEventListener('click', () => {
                            document.querySelectorAll('.error-token').forEach(tk => tk.classList.remove('selected'));
                            t.classList.add('selected');
                            selectedToken = t.dataset.token;
                            document.getElementById('submitErrorBtn').disabled = false;
                        });
                    });
                    document.getElementById('submitErrorBtn').addEventListener('click', () => {
                        if (selectedToken) handleSubmit(selectedToken);
                    });
                }
                else if (q.is_rearrangement) {
                    attachDragDrop(q.id);
                    document.getElementById('resetRearrangeBtn').addEventListener('click', () => resetRearrange(q.id));
                    document.getElementById('checkRearrangeBtn').addEventListener('click', () => checkRearrangeAnswer(q));
                }
                else if (q.options) {
                    document.querySelectorAll('.option-item').forEach(row => {
                        row.addEventListener('click', () => {
                            if (document.getElementById('feedbackBox')) return;
                            document.querySelectorAll('.option-item').forEach(r => r.classList.remove('selected'));
                            row.classList.add('selected');
                            handleSubmit(row.dataset.optIndex);
                        });
                    });
                }
                else if (q.data?.original_word) {
                    document.getElementById('submitFillBtn').addEventListener('click', () => {
                        const val = document.getElementById('fillInput').value;
                        if (val.trim()) handleSubmit(val);
                    });
                }
                else if (q.answer) {
                    document.getElementById('submitSimpleBtn').addEventListener('click', () => {
                        const val = document.getElementById('simpleFillInput').value;
                        if (val.trim()) handleSubmit(val);
                    });
                }
            }

            function checkRearrangeAnswer(q) {
                if (document.getElementById('feedbackBox')) return;
                const drop = document.getElementById(`drop_${q.id}`);
                if (!drop) return;
                const user = [...drop.querySelectorAll('.chunk')].map(c => c.innerText.trim()).join(' ');
                const correct = (q.answer || '').trim();
                const isCorrect = user === correct;
                userAnswers[currentIndex] = { selected: user, isCorrect, correctAnswer: correct };
                if (isCorrect) correctCount++; else wrongCount++;
                updateMeta();
                showFeedback(isCorrect, correct);
            }

            function attachDragDrop(qid) {
                const pool = document.getElementById(`pool_${qid}`);
                const drop = document.getElementById(`drop_${qid}`);
                if (!pool || !drop) return;
                let dragged = null;
                const dragStart = (e) => { dragged = e.target; e.target.style.opacity = '0.4'; };
                const dragEnd = (e) => { e.target.style.opacity = '1'; dragged = null; };
                const dragOver = (e) => e.preventDefault();
                const dropHandler = (e) => {
                    e.preventDefault();
                    if (!dragged || !drop) return;
                    const clone = document.createElement('span');
                    clone.className = 'chunk';
                    clone.innerText = dragged.innerText;
                    clone.setAttribute('draggable', 'true');
                    clone.addEventListener('dragstart', dragStart);
                    clone.addEventListener('dragend', dragEnd);
                    drop.appendChild(clone);
                    dragged.remove();
                };
                pool.querySelectorAll('.chunk').forEach(ch => {
                    ch.addEventListener('dragstart', dragStart);
                    ch.addEventListener('dragend', dragEnd);
                    ch.setAttribute('draggable', 'true');
                });
                drop.addEventListener('dragover', dragOver);
                drop.addEventListener('drop', dropHandler);
            }

            function resetRearrange(qid) {
                const pool = document.getElementById(`pool_${qid}`);
                const drop = document.getElementById(`drop_${qid}`);
                if (!pool || !drop) return;
                const all = [...pool.querySelectorAll('.chunk'), ...drop.querySelectorAll('.chunk')];
                const texts = all.map(c => c.innerText);
                shuffleArray(texts);
                pool.innerHTML = '';
                drop.innerHTML = '';
                texts.forEach(t => {
                    const ch = document.createElement('span');
                    ch.className = 'chunk';
                    ch.innerText = t;
                    ch.setAttribute('draggable', 'true');
                    pool.appendChild(ch);
                });
                attachDragDrop(qid);
            }

            loadAndPrepare();
        })();
    </script>
</body>
</html>
