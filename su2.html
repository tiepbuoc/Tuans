<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn tập Lịch sử 11 - Trắc nghiệm & Đúng sai</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .quiz-header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        .quiz-header h1 {
            color: #1e3c72;
            margin-bottom: 10px;
        }

        .quiz-header .progress {
            color: #666;
            margin-top: 10px;
            font-size: 1.1em;
        }

        .question-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.3em;
            font-weight: 600;
            color: #1e3c72;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .doc-text {
            background: #f0f4f8;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 4px solid #ff9800;
            line-height: 1.6;
            white-space: pre-wrap;
            font-size: 0.95em;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 25px 0;
        }

        .option-btn {
            padding: 14px 20px;
            border: 2px solid #ddd;
            border-radius: 12px;
            background: white;
            font-size: 1em;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
        }

        .option-btn.correct-answer {
            background: #4caf50;
            border-color: #2e7d32;
            color: white;
        }

        .option-btn.wrong-answer {
            background: #f44336;
            border-color: #c62828;
            color: white;
        }

        .option-btn.disabled-opt {
            cursor: default;
        }

        .truefalse-container {
            margin: 20px 0;
        }

        .statement-card {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .statement-text {
            font-weight: 500;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .tf-options {
            display: flex;
            gap: 20px;
        }

        .tf-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 1em;
        }

        .tf-options input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .statement-card.disabled-stmt .tf-options label {
            cursor: default;
        }

        .statement-card.disabled-stmt input {
            cursor: default;
        }

        .statement-card.correct-stmt {
            background: #4caf50;
            border-color: #2e7d32;
            color: white;
        }

        .statement-card.wrong-stmt {
            background: #f44336;
            border-color: #c62828;
            color: white;
        }

        .confirm-btn {
            background: #2196f3;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }

        .confirm-btn:hover {
            background: #1976d2;
        }

        .confirm-btn:disabled {
            background: #9e9e9e;
            cursor: default;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 20px;
        }

        .nav-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
        }

        .prev-btn {
            background: #607d8b;
            color: white;
        }

        .next-btn {
            background: #1e3c72;
            color: white;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: default;
        }

        .reset-btn {
            background: #ff9800;
            color: white;
        }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 10px;
            border-left: 4px solid #2196f3;
            font-size: 0.95em;
        }

        .score-board {
            background: white;
            border-radius: 15px;
            padding: 15px 20px;
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        @media (max-width: 768px) {
            .question-card {
                padding: 20px;
            }
            .question-text {
                font-size: 1.1em;
            }
            .tf-options {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="quiz-header">
            <div class="progress" id="progress">Đang tải...</div>
        </div>

        <div class="question-card" id="questionCard">
            <div style="text-align:center; padding:40px;">Đang tải câu hỏi...</div>
        </div>

        <div class="score-board" id="scoreBoard">
            📊 Đã trả lời: 0 / 0 câu
        </div>
    </div>

    <script>
        let questions = [];
        let currentIndex = 0;
        let userAnswers = [];

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        async function loadQuestions() {
            try {
                const response = await fetch('questions.json');
                const data = await response.json();
                questions = shuffleArray(data.questions);
                initUserAnswers();
                renderQuestion();
                updateProgress();
            } catch (error) {
                console.error('Lỗi:', error);
                document.getElementById('questionCard').innerHTML = '<div style="color:red;padding:20px;">Không thể tải dữ liệu. Vui lòng đảm bảo file questions.json cùng thư mục.</div>';
            }
        }

        function initUserAnswers() {
            userAnswers = questions.map(() => ({
                answered: false,
                isCorrect: false,
                selected: null,
                showExplanation: false,
                tfAnswers: null
            }));
        }


        function renderQuestion() {
            const q = questions[currentIndex];
            const card = document.getElementById('questionCard');
            const userAns = userAnswers[currentIndex];

            if (!q) return;

            let html = `<div class="question-text">${escapeHtml(q.text)}</div>`;

            if (q.type === 'true_false') {
                html += `<div class="doc-text">${escapeHtml(q.text)}</div>`;
                html += `<div class="truefalse-container" id="tfContainer">`;
                
                q.statements.forEach((stmt, idx) => {
                    const letter = String.fromCharCode(97 + idx);
                    let cardClass = '';
                    let disabled = '';
                    let selectedValue = '';
                    
                    if (userAns.answered && userAns.tfAnswers) {
                        const userChoice = userAns.tfAnswers[idx];
                        const isCorrect = (userChoice === q.correct[idx]);
                        cardClass = isCorrect ? 'correct-stmt' : 'wrong-stmt';
                        disabled = 'disabled-stmt';
                        selectedValue = userChoice === true ? 'true' : 'false';
                    }
                    
                    html += `
                        <div class="statement-card ${cardClass} ${disabled}" data-stmt-idx="${idx}">
                            <div class="statement-text"><strong>${letter}.</strong> ${escapeHtml(stmt)}</div>
                            <div class="tf-options">
                                <label>
                                    <input type="radio" name="stmt_${idx}" value="true" ${selectedValue === 'true' ? 'checked' : ''} ${userAns.answered ? 'disabled' : ''}>
                                    ✅ Đúng
                                </label>
                                <label>
                                    <input type="radio" name="stmt_${idx}" value="false" ${selectedValue === 'false' ? 'checked' : ''} ${userAns.answered ? 'disabled' : ''}>
                                    ❌ Sai
                                </label>
                            </div>
                        </div>
                    `;
                });
                
                if (!userAns.answered) {
                    html += `<button class="confirm-btn" id="confirmBtn">✅ Xác nhận đáp án</button>`;
                }
                html += `</div>`;
            } 
            else {
                html += `<div class="options" id="optionsContainer">`;
                q.options.forEach((opt, idx) => {
                    let additionalClass = '';
                    if (userAns.answered) {
                        if (userAns.selected === idx) {
                            additionalClass = (idx === q.correct) ? 'correct-answer' : 'wrong-answer';
                        }
                        if (idx === q.correct && userAns.selected !== idx) {
                            additionalClass = 'correct-answer';
                        }
                        additionalClass += ' disabled-opt';
                    }
                    html += `<button class="option-btn ${additionalClass}" data-opt-index="${idx}" ${userAns.answered ? 'disabled' : ''}>${escapeHtml(opt)}</button>`;
                });
                html += `</div>`;
            }

            html += `<div class="nav-buttons">
                        <button class="nav-btn prev-btn" id="prevBtn" ${currentIndex === 0 ? 'disabled' : ''}>◀</button>
                        <button class="nav-btn reset-btn" id="resetBtn">🔄 Làm lại</button>
                        <button class="nav-btn next-btn" id="nextBtn">▶</button>
                    </div>`;

            if (userAns.answered && q.explanation) {
                html += `<div class="explanation">💡 Giải thích: ${escapeHtml(q.explanation)}</div>`;
            }

            card.innerHTML = html;

            if (q.type === 'multiple_choice' && !userAns.answered) {
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        if (userAnswers[currentIndex].answered) return;
                        const selectedIdx = parseInt(btn.dataset.optIndex);
                        handleMultipleChoiceAnswer(currentIndex, selectedIdx);
                    });
                });
            }

            if (q.type === 'true_false' && !userAns.answered) {
                const confirmBtn = document.getElementById('confirmBtn');
                if (confirmBtn) {
                    confirmBtn.addEventListener('click', () => {
                        handleTrueFalseAnswer(currentIndex);
                    });
                }
            }

            document.getElementById('prevBtn')?.addEventListener('click', () => {
                if (currentIndex > 0) {
                    currentIndex--;
                    renderQuestion();
                    updateProgress();
                }
            });
            document.getElementById('nextBtn')?.addEventListener('click', () => {
                if (currentIndex < questions.length - 1) {
                    currentIndex++;
                    renderQuestion();
                    updateProgress();
                }
            });
            document.getElementById('resetBtn')?.addEventListener('click', () => {
                if (confirm('Làm lại toàn bộ? Tất cả câu trả lời sẽ bị xóa.')) {
                    initUserAnswers();
                    currentIndex = 0;
                    renderQuestion();
                    updateProgress();
                }
            });
        }

        function handleMultipleChoiceAnswer(qIndex, selectedIdx) {
            const q = questions[qIndex];
            userAnswers[qIndex] = {
                answered: true,
                isCorrect: (selectedIdx === q.correct),
                selected: selectedIdx,
                showExplanation: true,
                tfAnswers: null
            };
            renderQuestion();
            updateProgress();
        }

        function handleTrueFalseAnswer(qIndex) {
            const q = questions[qIndex];
            const tfAnswers = [];
            let allSelected = true;
            
            for (let i = 0; i < q.statements.length; i++) {
                const trueRadio = document.querySelector(`input[name="stmt_${i}"][value="true"]`);
                const falseRadio = document.querySelector(`input[name="stmt_${i}"][value="false"]`);
                if (trueRadio && falseRadio) {
                    if (trueRadio.checked) {
                        tfAnswers[i] = true;
                    } else if (falseRadio.checked) {
                        tfAnswers[i] = false;
                    } else {
                        allSelected = false;
                    }
                } else {
                    allSelected = false;
                }
            }
            
            if (!allSelected) {
                alert('Vui lòng chọn Đúng hoặc Sai cho tất cả các mệnh đề trước khi xác nhận!');
                return;
            }
            
            userAnswers[qIndex] = {
                answered: true,
                isCorrect: false,
                selected: null,
                showExplanation: true,
                tfAnswers: tfAnswers
            };
            
            renderQuestion();
            updateProgress();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;')
                .replace(/\n/g, '<br>');
        }

        loadQuestions();
    </script>
</body>
</html>
