<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Ôn tập</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #f0f5fa 0%, #e6ecf3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .card {
            max-width: 900px;
            width: 100%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(0, 20, 40, 0.2), 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255,255,255,0.5);
            overflow: hidden;
            padding: 24px 20px;
            text-align: center;
        }

        .header {
            margin-bottom: 40px;
        }

        .title-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0b3954, #1f5e8e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 30px;
        }

        .exam-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .exam-card {
            background: white;
            border-radius: 40px;
            padding: 30px 25px;
            box-shadow: 0 10px 25px rgba(0, 20, 40, 0.1);
            border: 1px solid rgba(255,255,255,0.8);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .exam-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 20, 40, 0.15);
        }

        .exam-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            display: block;
        }

        .exam-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0b3954;
            margin-bottom: 10px;
        }

        .exam-desc {
            font-size: 1rem;
            color: #666;
            line-height: 1.5;
        }

        @media (min-width: 700px) {
            .card { padding: 40px 40px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>Ôn tập</h1>
        </div>

        <div class="exam-grid">
            <a href="tienganh.html" class="exam-card">
                <i class="fas fa-book-open exam-icon" style="color: #2271b1;"></i>
                <div class="exam-title">Đề cương tiếng anh</div>
                
            </a>

            <a href="lichsu.html" class="exam-card">
                <i class="fas fa-landmark exam-icon" style="color: #1f5e8e;"></i>
                <div class="exam-title">Đề cương lịch sử</div>
                
            </a>
        </div>
    </div>
</body>
</html>
